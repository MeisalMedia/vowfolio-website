    // ── Helpers ──
    function statusBadge(status) {
      const labels = { draft:'Utkast', sent:'Sendt', viewed:'Sett', signed_by_client:'Klient signert', signed_by_photographer:'Fotograf signert', fully_signed:'Ferdig signert' };
      const cls = { draft:'badge-draft', sent:'badge-sent', viewed:'badge-sent', signed_by_client:'badge-signed', signed_by_photographer:'badge-signed', fully_signed:'badge-signed' };
      return `<span class="badge ${cls[status]||'badge-draft'}">${labels[status]||status}</span>`;
    }
    function genToken() { const b=new Uint8Array(32); crypto.getRandomValues(b); return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join(''); }
    async function hashToken(t) { const d=new TextEncoder().encode(t); const b=await crypto.subtle.digest('SHA-256',d); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }

    function resolvePlaceholders(content, w, c) {
      w = w||{}; c = c||{};
      const df = new Intl.DateTimeFormat('nb-NO', { day:'numeric', month:'long', year:'numeric' });
      const wd = w.wedding_date ? df.format(new Date(w.wedding_date)) : 'TBD';
      const price = w.contract_value ? w.contract_value.toLocaleString('nb-NO')+' kr' : 'TBD';
      return content
        .replace(/\{\{primary_name\}\}/g, c.primary_name||w.partner1||'')
        .replace(/\{\{partner_name\}\}/g, c.partner_name||w.partner2||'')
        .replace(/\{\{email\}\}/g, c.email||'')
        .replace(/\{\{phone\}\}/g, c.phone||'')
        .replace(/\{\{wedding_date\}\}/g, wd)
        .replace(/\{\{venue_name\}\}/g, w.venue||c.venue_name||'')
        .replace(/\{\{venue_address\}\}/g, w.venue_address||c.venue_address||'')
        .replace(/\{\{studio_name\}\}/g, studioName)
        .replace(/\{\{package_price\}\}/g, price)
        .replace(/\{\{today_date\}\}/g, df.format(new Date()))
        .replace(/\s*&\s*\n/g, '\n');
    }

    function mdToHtml(md) {
      if (!md) return '';
      const lines = md.split('\n');
      let html = '', inList = false;
      for (let line of lines) {
        const t = line.trim();
        if (t === '---') { if (inList) { html += '</ul>'; inList = false; } html += '<hr>'; continue; }
        if (t.startsWith('- ')) { if (!inList) { html += '<ul>'; inList = true; } html += '<li>'+formatInline(t.slice(2))+'</li>'; continue; }
        if (inList) { html += '</ul>'; inList = false; }
        if (t.startsWith('### ')) html += '<h3>'+formatInline(t.slice(4))+'</h3>';
        else if (t.startsWith('## ')) html += '<h2>'+formatInline(t.slice(3))+'</h2>';
        else if (t.startsWith('# ')) html += '<h1>'+formatInline(t.slice(2))+'</h1>';
        else if (t === '') html += '<p><br></p>';
        else html += '<p>'+formatInline(t)+'</p>';
      }
      if (inList) html += '</ul>';
      return html;
    }
    function formatInline(text) {
      let h = esc(text);
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
      return h;
    }
    function htmlToMd(html) {
      let md = html;
      md = md.replace(/<h1>(.*?)<\/h1>/gi, '# $1\n');
      md = md.replace(/<h2>(.*?)<\/h2>/gi, '## $1\n');
      md = md.replace(/<h3>(.*?)<\/h3>/gi, '### $1\n');
      md = md.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
      md = md.replace(/<em>(.*?)<\/em>/gi, '*$1*');
      md = md.replace(/<hr\s*\/?>/gi, '\n---\n');
      md = md.replace(/<li>(.*?)<\/li>/gi, '- $1\n');
      md = md.replace(/<ul>|<\/ul>|<ol>|<\/ol>/gi, '');
      md = md.replace(/<br\s*\/?>/gi, '\n');
      md = md.replace(/<p>(.*?)<\/p>/gi, '$1\n\n');
      md = md.replace(/<[^>]+>/g, '');
      md = md.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
      md = md.replace(/\n{3,}/g, '\n\n').trim();
      return md;
    }
    // ── Kontakt modal ──
    function showKontaktModal() {
      const m = document.getElementById('kontaktModal');
      m.style.display = 'flex';
      ['kName','kPartner','kEmail','kPhone','kSource','kDate','kVenue','kNotes'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.getElementById('kStatus').value = 'inquiry';
      setTimeout(() => document.getElementById('kName').focus(), 50);
    }
    function hideKontaktModal() {
      document.getElementById('kontaktModal').style.display = 'none';
    }
    async function saveKontakt() {
      const name = document.getElementById('kName').value.trim();
      if (!name) { showToast('Navn er påkrevd'); return; }
      const { data, error } = await sb.from('crm_contacts').insert({
        primary_name: name,
        partner_name: document.getElementById('kPartner').value.trim() || null,
        email: document.getElementById('kEmail').value.trim() || null,
        phone: document.getElementById('kPhone').value.trim() || null,
        status: document.getElementById('kStatus').value,
        source: document.getElementById('kSource').value.trim() || null,
        wedding_date: document.getElementById('kDate').value || null,
        venue_name: document.getElementById('kVenue').value.trim() || null,
        notes: document.getElementById('kNotes').value.trim() || null,
      }).select().single();
      if (error) { showToast('Feil: ' + error.message); return; }
      await loadData();
      hideKontaktModal();
      showToast('Kontakt lagret');
      navigate('kontaktDetail', data.id);
    }

    function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
    function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
  </script>
</body>
</html>
