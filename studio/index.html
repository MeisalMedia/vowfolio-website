    async function uploadContactPdf(contactId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/pdf';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type !== 'application/pdf') { showToast('Kun PDF er støttet'); return; }
        showToast('Laster opp…');
        const ext = (file.name.split('.').pop() || 'pdf').toLowerCase();
        const path = `${currentUser.id}/${contactId}/attachments/${crypto.randomUUID()}.${ext}`;
        const { error: upErr } = await sb.storage.from('document-files').upload(path, file, { contentType: file.type });
        if (upErr) { showToast('Opplasting feilet: ' + upErr.message); return; }
        const { error: insErr } = await sb.from('document_instances').insert({
          contact_id: contactId,
          type: 'info_document',
          status: 'uploaded',
          title: file.name,
          content: '',
          pdf_storage_path: path,
          uploaded_filename: file.name,
          uploaded_mime_type: file.type,
        });
        if (insErr) { showToast('Lagring feilet: ' + insErr.message); return; }
        await loadData();
        renderKontaktDetail(document.getElementById('mainContent'), contactId);
        showToast('Vedlegg lastet opp');
      };
      input.click();
    }

    async function openContactAttachment(docId) {
      const doc = documents.find(d => d.id === docId);
      if (!doc?.pdf_storage_path) { showToast('Finner ikke filen'); return; }
      const { data, error } = await sb.storage.from('document-files').createSignedUrl(doc.pdf_storage_path, 300);
      if (error) { showToast('Kunne ikke åpne: ' + error.message); return; }
      window.open(data.signedUrl, '_blank');
    }

    async function deleteContactAttachment(docId, contactId) {
      const doc = documents.find(d => d.id === docId);
      if (!doc) return;
      if (!confirm(`Slette ${doc.title || 'vedlegget'}?`)) return;
      if (doc.pdf_storage_path) {
        await sb.storage.from('document-files').remove([doc.pdf_storage_path]);
      }
      const { error } = await sb.from('document_instances').delete().eq('id', docId);
      if (error) { showToast('Feil: ' + error.message); return; }
      await loadData();
      renderKontaktDetail(document.getElementById('mainContent'), contactId);
      showToast('Vedlegg slettet');
    }

    async function saveContactNotes(contactId) {
      const notes = document.getElementById('contactNotes').value;
      const { error } = await sb.from('crm_contacts').update({ notes, updated_at: new Date().toISOString() }).eq('id', contactId);
      if (error) { showToast('Feil: ' + error.message); return; }
      const c = contacts.find(x => x.id === contactId);
      if (c) c.notes = notes;
      document.getElementById('saveNotesBtn').style.display = 'none';
      showToast('Notater lagret');
    }

    function toggleDokumenter() {
      const sub = document.getElementById('dokumenterSub');
      const chev = document.getElementById('dokumenterChevron');
      const open = sub.style.display !== 'none';
      sub.style.display = open ? 'none' : 'block';
      chev.style.transform = open ? 'rotate(-90deg)' : 'rotate(0)';
    }
    function expandDokumenter() {
      const sub = document.getElementById('dokumenterSub');
      const chev = document.getElementById('dokumenterChevron');
      sub.style.display = 'block';
      chev.style.transform = 'rotate(0)';
    }

    // ── Kontrakter (documents) ──
    function renderKontrakter(el) {
      const statusLabels = { draft:'Utkast', sent:'Sendt', viewed:'Sett', signed_by_client:'Klient signert', signed_by_photographer:'Fotograf signert', fully_signed:'Ferdig signert', archived:'Arkivert' };
      let html = `<div class="main-content">`;
      html += `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn-primary btn-sm" onclick="navigate('createDoc')">+ Ny kontrakt</button></div>`;
      if (documents.length === 0) {
        html += `<div class="empty-state"><div class="icon" style="font-size:48px;opacity:0.35;margin-bottom:16px"><svg width="48" height="48" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><h3>Ingen kontrakter enda</h3><p>Opprett en kontrakt fra en mal.</p><button class="btn-primary" onclick="navigate('createDoc')">Opprett kontrakt</button></div>`;
      } else {
        html += `<div class="table-wrap"><table class="data-table"><thead><tr><th>Tittel</th><th>Klient</th><th>Bryllup</th><th>Status</th><th>Opprettet</th></tr></thead><tbody>`;
        for (const doc of documents) {
          const c = contacts.find(x => x.id === doc.contact_id);
          const w = doc.wedding_id ? weddings.find(x => x.id === doc.wedding_id) : null;
          const couple = w ? (w.partner2 ? `${w.partner1} & ${w.partner2}` : w.partner1) : '—';
          const date = new Date(doc.created_at).toLocaleDateString('nb-NO', { day:'numeric', month:'short', year:'numeric' });
          html += `<tr onclick="navigate('viewDoc','${doc.id}')"><td><strong>${esc(doc.title)}</strong></td><td style="color:#8A7D72">${esc(c?.primary_name||'—')}</td><td style="color:#8A7D72">${esc(couple)}</td><td>${statusBadge(doc.status)}</td><td style="color:#8A7D72">${date}</td></tr>`;
        }
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    // ── Maler ──
    function renderMaler(el, tabOverride) {
      if (tabOverride) malerTab = tabOverride;
      const df = d => new Date(d).toLocaleDateString('nb-NO', { day:'numeric', month:'short', year:'numeric' });
      const tabs = [
        { key: 'kontrakt', label: 'Kontrakter', count: templates.length },
        { key: 'shot', label: 'Shotlister', count: shotTemplates.length },
        { key: 'oppgave', label: 'Oppgaver', count: taskTemplates.length },
      ];

      const addLabels = { kontrakt: '+ Ny kontraktsmal', shot: '+ Ny shotliste', oppgave: '+ Ny oppgavemal' };
      const addActions = { kontrakt: "navigate('newTemplate')", shot: "navigate('newShotTemplate')", oppgave: "navigate('newTaskTemplate')" };

      let html = `<div class="main-content">`;

      // Tabs + add button
      html += `<div class="tabs" style="display:flex;align-items:center">`;
      for (const t of tabs) {
        const active = malerTab === t.key;
        html += `<div class="tab${active?' active':''}" onclick="renderMaler(document.getElementById('mainContent'),'${t.key}')">${t.label} <span style="opacity:0.5;font-weight:400">${t.count}</span></div>`;
      }
      html += `<div style="margin-left:auto;padding-right:4px"><button class="btn-primary btn-sm" onclick="${addActions[malerTab]}">${addLabels[malerTab]}</button></div>`;
      html += `</div>`;

      if (malerTab === 'kontrakt') {
        if (templates.length === 0) {
          html += `<div class="empty-state"><div class="icon" style="font-size:48px;opacity:0.35;margin-bottom:16px"><svg width="48" height="48" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="9" x2="20" y2="9"/><line x1="9" y1="9" x2="9" y2="20"/></svg></div><h3>Ingen kontraktsmaler enda</h3><p>Opprett din første kontraktsmal.</p><button class="btn-primary" onclick="navigate('newTemplate')">Opprett mal</button></div>`;
        } else {
          html += `<div class="card-grid card-grid-auto">`;
          for (const t of templates) {
            html += `<div class="template-card" onclick="navigate('editTemplate','${t.id}')"><h3>${esc(t.title)}</h3><p class="meta">Oppdatert ${df(t.updated_at)}</p><div style="margin-top:8px"><span class="badge badge-contract">${{contract:'Kontrakt',quote:'Tilbud',questionnaire:'Spørreskjema',info_document:'Info'}[t.type]||t.type}</span></div></div>`;
          }
          html += `</div>`;
        }
      } else if (malerTab === 'shot') {
        if (shotTemplates.length === 0) {
          html += `<div class="empty-state"><div class="icon" style="font-size:48px;opacity:0.35;margin-bottom:16px"><svg width="48" height="48" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l2-2.5h6L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13.5" r="3.5"/></svg></div><h3>Ingen shotlistemaler</h3><p>Shotlister administreres i appen for nå.</p></div>`;
        } else {
          html += `<div class="card-grid card-grid-auto">`;
          for (const t of shotTemplates) {
            const cats = Array.isArray(t.categories) ? t.categories : [];
            const itemCount = cats.reduce((n, cat) => n + (Array.isArray(cat.items) ? cat.items.length : 0), 0);
            html += `<div class="template-card" onclick="navigate('editShotTemplate','${t.id}')"><h3>${esc(t.name)}</h3>`;
            if (t.description) html += `<p class="meta">${esc(t.description)}</p>`;
            html += `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap"><span class="badge badge-contract">${cats.length} kategori${cats.length!==1?'er':''}</span><span class="badge badge-contract" style="background:rgba(107,143,113,0.12);color:var(--sage)">${itemCount} shots</span></div></div>`;
          }
          html += `</div>`;
        }
      } else if (malerTab === 'oppgave') {
        if (taskTemplates.length === 0) {
          html += `<div class="empty-state"><div class="icon" style="font-size:48px;opacity:0.35;margin-bottom:16px"><svg width="48" height="48" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><h3>Ingen oppgavemaler</h3><p>Oppgavemaler administreres i appen for nå.</p></div>`;
        } else {
          html += `<div class="card-grid card-grid-auto">`;
          for (const t of taskTemplates) {
            const tasks = Array.isArray(t.tasks) ? t.tasks : [];
            html += `<div class="template-card" onclick="navigate('editTaskTemplate','${t.id}')"><h3>${esc(t.name)}</h3>`;
            const badges = [];
            if (t.project_type) badges.push(esc(t.project_type));
            if (t.auto_apply) badges.push('Auto');
            if (t.is_built_in) badges.push('Innebygd');
            html += `<p class="meta">${tasks.length} oppgave${tasks.length!==1?'r':''}</p>`;
            if (badges.length) {
              html += `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">`;
              for (const b of badges) html += `<span class="badge badge-contract">${b}</span>`;
              html += `</div>`;
            }
            html += `</div>`;
          }
          html += `</div>`;
        }
      }

      html += `</div>`;
      el.innerHTML = html;
    }

    let settingsDraft = null;

    function renderSettings(el) {
      const s = studioSettings || {};
      settingsDraft = {
        studio_name: s.studio_name || '',
        country: s.country || '',
        currency_code: s.currency_code || '',
        currency_symbol: s.currency_symbol || '',
        timezone: s.timezone || '',
        portal_hero_url: s.portal_hero_url || '',
        logo_url: s.logo_url || '',
      };

      const fieldLabel = 'font-size:11px;font-weight:600;color:#A09080;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px';
      const fieldInput = 'width:100%;padding:10px 12px;border:1.5px solid var(--sand);border-radius:8px;font-size:14px;font-family:inherit;background:var(--white);color:var(--espresso)';

      let html = `<div class="main-content"><div style="display:flex;justify-content:flex-end;margin-bottom:20px"><button class="btn-primary" onclick="saveStudioSettings()">Lagre</button></div>`;

      html += `<div class="settings-section"><h3>Studio-profil</h3><div class="card" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">`;
      html += `<div><label style="${fieldLabel}">Studio-navn</label><input type="text" value="${esc(settingsDraft.studio_name)}" oninput="settingsDraft.studio_name=this.value" placeholder="f.eks. Ole Foto" style="${fieldInput}"></div>`;
      html += `<div><label style="${fieldLabel}">Land</label><input type="text" value="${esc(settingsDraft.country)}" oninput="settingsDraft.country=this.value" placeholder="Norge" style="${fieldInput}"></div>`;
      html += `<div><label style="${fieldLabel}">Valuta</label><input type="text" value="${esc(settingsDraft.currency_code)}" oninput="settingsDraft.currency_code=this.value.toUpperCase()" placeholder="NOK" maxlength="3" style="${fieldInput}"></div>`;
      html += `<div><label style="${fieldLabel}">Valutasymbol</label><input type="text" value="${esc(settingsDraft.currency_symbol)}" oninput="settingsDraft.currency_symbol=this.value" placeholder="kr" maxlength="3" style="${fieldInput}"></div>`;
      html += `<div><label style="${fieldLabel}">Tidssone</label><input type="text" value="${esc(settingsDraft.timezone)}" oninput="settingsDraft.timezone=this.value" placeholder="Europe/Oslo" style="${fieldInput}"></div>`;
      html += `</div></div>`;

      html += `<div class="settings-section"><h3>Merkevare</h3><div class="card" style="display:flex;flex-direction:column;gap:16px">`;
      html += `<div><label style="${fieldLabel}">Logo URL</label><input type="url" value="${esc(settingsDraft.logo_url)}" oninput="settingsDraft.logo_url=this.value;document.getElementById('logoPreview').src=this.value||''" placeholder="https://..." style="${fieldInput}">`;
      html += `<div style="margin-top:8px">${settingsDraft.logo_url ? `<img id="logoPreview" src="${esc(settingsDraft.logo_url)}" style="max-height:60px;max-width:200px;border-radius:6px;border:1px solid var(--sand);padding:4px;background:var(--white)" onerror="this.style.display='none'">` : `<img id="logoPreview" style="display:none">`}</div></div>`;
      html += `<div><label style="${fieldLabel}">Portal hero-bilde URL</label><input type="url" value="${esc(settingsDraft.portal_hero_url)}" oninput="settingsDraft.portal_hero_url=this.value;document.getElementById('heroPreview').src=this.value||''" placeholder="https://..." style="${fieldInput}">`;
      html += `<div style="margin-top:8px">${settingsDraft.portal_hero_url ? `<img id="heroPreview" src="${esc(settingsDraft.portal_hero_url)}" style="max-height:120px;max-width:100%;border-radius:6px;border:1px solid var(--sand);object-fit:cover" onerror="this.style.display='none'">` : `<img id="heroPreview" style="display:none">`}</div></div>`;
      html += `</div></div>`;

      html += `<div class="settings-section"><h3>Konto</h3><div class="card" style="display:flex;flex-direction:column;gap:12px">`;
      html += `<div class="field" style="margin:0"><label style="${fieldLabel}">E-post</label><p style="font-size:14px">${esc(currentUser?.email || '—')}</p></div>`;
      const proBadge = (s.is_pro ? '<span class="badge" style="background:rgba(107,143,113,0.15);color:var(--sage);font-weight:600">Pro</span>' : '<span class="badge badge-draft">Gratis</span>');
      html += `<div class="field" style="margin:0"><label style="${fieldLabel}">Plan</label><div>${proBadge}</div></div>`;
      html += `<div><button class="btn-outline btn-sm" onclick="logout()" style="color:var(--danger);border-color:var(--danger)">Logg ut</button></div>`;
      html += `</div></div>`;

      html += `</div>`;
      el.innerHTML = html;
    }

    async function saveStudioSettings() {
      if (!currentUser) return;
      const payload = {
        id: studioSettings?.id || crypto.randomUUID(),
        user_id: currentUser.id,
        studio_name: settingsDraft.studio_name.trim() || null,
        country: settingsDraft.country.trim() || null,
        currency_code: settingsDraft.currency_code.trim() || null,
        currency_symbol: settingsDraft.currency_symbol.trim() || null,
        timezone: settingsDraft.timezone.trim() || null,
        portal_hero_url: settingsDraft.portal_hero_url.trim() || null,
        logo_url: settingsDraft.logo_url.trim() || null,
        updated_at: new Date().toISOString(),
      };
      const { error } = await sb.from('studio_settings').upsert(payload, { onConflict: 'id' });
      if (error) { showToast('Feil ved lagring'); console.error(error); return; }
      const { data } = await sb.from('studio_settings').select('*').limit(1);
      studioSettings = data?.[0] || studioSettings;
      studioName = studioSettings?.studio_name || '';
      showToast('Lagret');
    }

    // ── Task Template editor ──
    let taskEditorState = null;

    function renderTaskTemplateEditor(el, templateId) {
      const existing = templateId ? taskTemplates.find(t => t.id === templateId) : null;
      taskEditorState = {
        id: existing?.id || crypto.randomUUID(),
        isNew: !existing,
        name: existing?.name || '',
        project_type: existing?.project_type || 'wedding',
        auto_apply: !!existing?.auto_apply,
        tasks: Array.isArray(existing?.tasks) ? JSON.parse(JSON.stringify(existing.tasks)) : [],
      };
      renderTaskEditorBody(el);
    }

    function taskEffectiveTrigger(t) {
      if (t.trigger) return t.trigger;
      if ((t.relative_days ?? 0) < 0) return 'event';
      if (t.after_event === true) return 'event';
      return 'inquiry';
    }

    function renderTaskEditorBody(el) {
      const s = taskEditorState;
      const stages = [
        { key: 'inquiry',  label: 'Henvendelse',      footer: 'Dager etter henvendelsen kom inn',  before: false },
        { key: 'booked',   label: 'Booking',          footer: 'Dager etter booking ble bekreftet', before: false },
        { key: 'eventBefore', label: 'Før bryllupet', footer: 'Dager før bryllupsdagen',           before: true,  trig: 'event' },
        { key: 'eventAfter',  label: 'Etter bryllupet', footer: 'Dager etter bryllupsdagen',       before: false, trig: 'event' },
      ];

      let html = `<div class="main-content">`;
      html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><button class="btn-outline btn-sm" onclick="navigate('maler',{tab:'oppgave'})">← Tilbake</button><input class="title-input" id="taskTmplName" placeholder="Navn på mal..." value="${esc(s.name)}" oninput="taskEditorState.name=this.value" style="flex:1"><button class="btn-primary btn-sm" onclick="saveTaskTemplate()">Lagre</button></div>`;
      html += `<div class="card" style="margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;align-items:center"><div><label style="font-size:11px;font-weight:600;color:#A09080;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Prosjekttype</label><select onchange="taskEditorState.project_type=this.value" style="padding:8px 12px;border:1.5px solid var(--sand);border-radius:8px;font-size:13px;font-family:inherit;background:var(--white)">${['wedding','couple','family','other'].map(v=>`<option value="${v}"${s.project_type===v?' selected':''}>${{wedding:'Bryllup',couple:'Par',family:'Familie',other:'Annet'}[v]}</option>`).join('')}</select></div><label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" ${s.auto_apply?'checked':''} onchange="taskEditorState.auto_apply=this.checked"> Brukes automatisk på nye oppdrag</label></div>`;

      for (const stage of stages) {
        const tasks = s.tasks
          .map((t, i) => ({ t, i }))
          .filter(({ t }) => {
            if (stage.key === 'inquiry') return taskEffectiveTrigger(t) === 'inquiry';
            if (stage.key === 'booked')  return taskEffectiveTrigger(t) === 'booked';
            if (stage.key === 'eventBefore') return taskEffectiveTrigger(t) === 'event' && (t.relative_days ?? 0) < 0;
            if (stage.key === 'eventAfter')  return taskEffectiveTrigger(t) === 'event' && (t.relative_days ?? 0) >= 0;
          });

        html += `<div class="card" style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--taupe);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">${stage.label}</div>`;
        if (tasks.length === 0) {
          html += `<p style="font-size:13px;color:#A09080;margin-bottom:10px">Ingen oppgaver her.</p>`;
        } else {
          for (const { t, i } of tasks) {
            html += `<div style="border-bottom:1px solid var(--sand);padding:10px 0;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">`;
            html += `<div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:220px">`;
            html += `<input type="text" placeholder="Tittel (EN)" value="${esc(t.title||'')}" oninput="updateTask(${i},'title',this.value)" style="padding:7px 10px;border:1.5px solid var(--sand);border-radius:6px;font-size:13px;font-family:inherit">`;
            html += `<input type="text" placeholder="Tittel (NO)" value="${esc(t.title_no||'')}" oninput="updateTask(${i},'title_no',this.value)" style="padding:7px 10px;border:1.5px solid var(--sand);border-radius:6px;font-size:13px;font-family:inherit;color:var(--taupe)">`;
            html += `</div>`;
            html += `<div style="display:flex;gap:6px;align-items:center"><input type="number" min="0" value="${Math.abs(t.relative_days ?? 0)}" onchange="updateTaskDays(${i},this.value,'${stage.key}')" style="width:60px;padding:7px 8px;border:1.5px solid var(--sand);border-radius:6px;font-size:13px;text-align:center;font-family:inherit"><span style="font-size:11px;color:var(--taupe)">${stage.before?'dager før':'dager etter'}</span></div>`;
            html += `<select onchange="updateTask(${i},'priority',this.value)" style="padding:7px 10px;border:1.5px solid var(--sand);border-radius:6px;font-size:12px;font-family:inherit;background:var(--white)">${['high','medium','low'].map(p=>`<option value="${p}"${t.priority===p?' selected':''}>${{high:'Høy',medium:'Medium',low:'Lav'}[p]}</option>`).join('')}</select>`;
            html += `<button class="btn-danger" style="padding:6px 10px;font-size:11px" onclick="removeTask(${i})">Slett</button>`;
            html += `</div>`;
          }
        }
        html += `<button class="btn-outline btn-sm" style="margin-top:10px" onclick="addTaskInStage('${stage.key}')">+ Legg til oppgave</button>`;
        html += `<div style="font-size:11px;color:#A09080;margin-top:8px">${stage.footer}</div>`;
        html += `</div>`;
      }

      html += `</div>`;
      el.innerHTML = html;
    }

    function addTaskInStage(key) {
      const map = { inquiry: { trigger: 'inquiry', days: 1 }, booked: { trigger: 'booked', days: 1 }, eventBefore: { trigger: 'event', days: -7 }, eventAfter: { trigger: 'event', days: 1 } };
      const cfg = map[key];
      taskEditorState.tasks.push({ title: '', title_no: '', relative_days: cfg.days, priority: 'medium', trigger: cfg.trigger });
      renderTaskEditorBody(document.getElementById('mainContent'));
    }

    function updateTask(i, key, val) {
      taskEditorState.tasks[i][key] = val;
    }

    function updateTaskDays(i, val, stageKey) {
      const n = Math.max(0, parseInt(val) || 0);
      const signed = stageKey === 'eventBefore' ? -n : n;
      taskEditorState.tasks[i].relative_days = signed;
    }

    function removeTask(i) {
      taskEditorState.tasks.splice(i, 1);
      renderTaskEditorBody(document.getElementById('mainContent'));
    }

    async function saveTaskTemplate() {
      const s = taskEditorState;
      if (!s.name.trim()) { showToast('Gi malen et navn'); return; }
      const cleaned = s.tasks.filter(t => (t.title||'').trim() || (t.title_no||'').trim()).map(t => {
        const copy = { ...t };
        if (!copy.trigger) copy.trigger = taskEffectiveTrigger(copy);
        return copy;
      });
      const payload = {
        id: s.id,
        user_id: currentUser.id,
        name: s.name.trim(),
        project_type: s.project_type,
        auto_apply: s.auto_apply,
        is_built_in: false,
        tasks: cleaned,
        updated_at: new Date().toISOString(),
      };
      const { error } = await sb.from('task_templates').upsert(payload, { onConflict: 'id' });
      if (error) { showToast('Feil ved lagring'); console.error(error); return; }
      showToast('Lagret');
      const { data } = await sb.from('task_templates').select('*').order('updated_at', { ascending: false });
      if (data) taskTemplates = data;
      navigate('maler', { tab: 'oppgave' });
    }

    // ── Shot Template editor ──
    let shotEditorState = null;

    function renderShotTemplateEditor(el, templateId) {
      const existing = templateId ? shotTemplates.find(t => t.id === templateId) : null;
      shotEditorState = {
        id: existing?.id || crypto.randomUUID(),
        isNew: !existing,
        name: existing?.name || '',
        description: existing?.description || '',
        categories: Array.isArray(existing?.categories) ? JSON.parse(JSON.stringify(existing.categories)) : [],
      };
      renderShotEditorBody(el);
    }

    function renderShotEditorBody(el) {
      const s = shotEditorState;
      let html = `<div class="main-content">`;
      html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><button class="btn-outline btn-sm" onclick="navigate('maler',{tab:'shot'})">← Tilbake</button><input class="title-input" id="shotTmplName" placeholder="Navn på shotliste..." value="${esc(s.name)}" oninput="shotEditorState.name=this.value" style="flex:1"><button class="btn-primary btn-sm" onclick="saveShotTemplate()">Lagre</button></div>`;
      html += `<div class="card" style="margin-bottom:16px"><label style="font-size:11px;font-weight:600;color:#A09080;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Beskrivelse</label><input type="text" placeholder="Kort beskrivelse (valgfritt)" value="${esc(s.description)}" oninput="shotEditorState.description=this.value" style="width:100%;padding:9px 12px;border:1.5px solid var(--sand);border-radius:8px;font-size:14px;font-family:inherit"></div>`;

      if (s.categories.length === 0) {
        html += `<p style="font-size:13px;color:#A09080;text-align:center;padding:20px">Ingen kategorier. Legg til en under.</p>`;

    function statusBadge(status) {

    function genToken() { const b=new Uint8Array(32); crypto.getRandomValues(b); return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join(''); }
    async function hashToken(t) { const d=new TextEncoder().encode(t); const b=await crypto.subtle.digest('SHA-256',d); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }

    function resolvePlaceholders(content, w, c) {
      w = w||{}; c = c||{};
      const df = new Intl.DateTimeFormat('nb-NO', { day:'numeric', month:'long', year:'numeric' });
      const wd = w.wedding_date ? df.format(new Date(w.wedding_date)) : 'TBD';
      const price = w.contract_value ? w.contract_value.toLocaleString('nb-NO')+' kr' : 'TBD';
      return content
        .replace(/\{\{primary_name\}\}/g, c.primary_name||w.partner1||'')
        .replace(/\{\{partner_name\}\}/g, c.partner_name||w.partner2||'')
        .replace(/\{\{email\}\}/g, c.email||'')
        .replace(/\{\{phone\}\}/g, c.phone||'')
        .replace(/\{\{wedding_date\}\}/g, wd)
        .replace(/\{\{venue_name\}\}/g, w.venue||c.venue_name||'')
        .replace(/\{\{venue_address\}\}/g, w.venue_address||c.venue_address||'')
        .replace(/\{\{studio_name\}\}/g, studioName)
        .replace(/\{\{package_price\}\}/g, price)
        .replace(/\{\{today_date\}\}/g, df.format(new Date()))
        .replace(/\s*&\s*\n/g, '\n');
    }

    function mdToHtml(md) {
      if (!md) return '';
      const lines = md.split('\n');
      let html = '', inList = false;
      for (let line of lines) {
        const t = line.trim();
        if (t === '---') { if (inList) { html += '</ul>'; inList = false; } html += '<hr>'; continue; }
        if (t.startsWith('- ')) { if (!inList) { html += '<ul>'; inList = true; } html += '<li>'+formatInline(t.slice(2))+'</li>'; continue; }
        if (inList) { html += '</ul>'; inList = false; }
        if (t.startsWith('### ')) html += '<h3>'+formatInline(t.slice(4))+'</h3>';
        else if (t.startsWith('## ')) html += '<h2>'+formatInline(t.slice(3))+'</h2>';
        else if (t.startsWith('# ')) html += '<h1>'+formatInline(t.slice(2))+'</h1>';
        else if (t === '') html += '<p><br></p>';
        else html += '<p>'+formatInline(t)+'</p>';
      }
      if (inList) html += '</ul>';
      return html;
    }
    function formatInline(text) {
      let h = esc(text);
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
      return h;
    }
    function htmlToMd(html) {
      let md = html;
      md = md.replace(/<h1>(.*?)<\/h1>/gi, '# $1\n');
      md = md.replace(/<h2>(.*?)<\/h2>/gi, '## $1\n');
      md = md.replace(/<h3>(.*?)<\/h3>/gi, '### $1\n');
      md = md.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
      md = md.replace(/<em>(.*?)<\/em>/gi, '*$1*');
      md = md.replace(/<hr\s*\/?>/gi, '\n---\n');
      md = md.replace(/<li>(.*?)<\/li>/gi, '- $1\n');
      md = md.replace(/<ul>|<\/ul>|<ol>|<\/ol>/gi, '');
      md = md.replace(/<br\s*\/?>/gi, '\n');
      md = md.replace(/<p>(.*?)<\/p>/gi, '$1\n\n');
      md = md.replace(/<[^>]+>/g, '');
      md = md.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
      md = md.replace(/\n{3,}/g, '\n\n').trim();
      return md;
    }

      showToast('Kontakt lagret');
      navigate('kontaktDetail', data.id);
    }

    // ── Nytt oppdrag modal ──
    function showNyttOppdragModal() {
      const m = document.getElementById('nyttOppdragModal');
      m.style.display = 'flex';
      ['noP1','noP2','noEmail','noPhone','noDate','noValue','noVenue','noSource'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.getElementById('noType').value = 'wedding';
      document.getElementById('noStatus').value = 'inquiry';
      setTimeout(() => document.getElementById('noP1').focus(), 50);
    }
    function hideNyttOppdragModal() {
      document.getElementById('nyttOppdragModal').style.display = 'none';
    }
    async function saveNyttOppdrag() {
      const btn = document.querySelector('#nyttOppdragModal .btn-primary');
      if (btn.disabled) return;
      btn.disabled = true; btn.textContent = 'Oppretter…';
      const p1 = document.getElementById('noP1').value.trim();
      if (!p1) { btn.disabled = false; btn.textContent = 'Opprett oppdrag'; showToast('Partner 1 er påkrevd'); return; }
      const p2 = document.getElementById('noP2').value.trim();
      const email = document.getElementById('noEmail').value.trim();
      const phone = document.getElementById('noPhone').value.trim();
      const weddingDate = document.getElementById('noDate').value || null;
      const contractValue = parseFloat(document.getElementById('noValue').value) || null;
      const venue = document.getElementById('noVenue').value.trim();
      const projectType = document.getElementById('noType').value;
      const status = document.getElementById('noStatus').value;
      const source = document.getElementById('noSource').value.trim();

      const { data: wedding, error: wErr } = await sb.from('weddings').insert({
        partner1: p1,
        partner2: p2 || null,
        wedding_date: weddingDate,
        venue: venue || null,
        contract_value: contractValue,
        project_type: projectType,
        user_id: currentUser.id,
      }).select().single();
      if (wErr) { showToast('Feil: ' + wErr.message); return; }

      const { error: cErr } = await sb.from('crm_contacts').insert({
        primary_name: p1,
        partner_name: p2 || '',
        email: email || '',
        phone: phone || '',
        status,
        source: source || '',
        wedding_date: weddingDate,
        venue_name: venue || '',
        notes: '',
        linked_wedding_id: wedding.id,
      });
      if (cErr) { showToast('Oppdrag opprettet, men kontakt feilet: ' + cErr.message); }

      await loadData();
      hideNyttOppdragModal();
      showToast('Oppdrag opprettet');
      navigate('oppdragDetail', wedding.id);
    }

    // ── Slett kontakt ──
    async function deleteKontakt(contactId) {
      if (!confirm('Slette denne kontakten? Dette kan ikke angres.')) return;
      const { error } = await sb.from('crm_contacts').delete().eq('id', contactId);
      if (error) { showToast('Feil: ' + error.message); return; }
      await loadData();
      navigate('kontakter');
      showToast('Kontakt slettet');
    }

    // ── Betaling modal ──
    function showBetalingModal() {
      const m = document.getElementById('betalingModal');
      m.style.display = 'flex';
      ['bTitle','bAmount','bDueDate','bPaidDate'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.getElementById('bStatus').value = 'unpaid';
      document.getElementById('bPaidDateGroup').style.display = 'none';
      document.getElementById('bStatus').onchange = function() {
        document.getElementById('bPaidDateGroup').style.display = this.value === 'paid' ? '' : 'none';
      };
      setTimeout(() => document.getElementById('bTitle').focus(), 50);
    }
    function hideBetalingModal() {
      document.getElementById('betalingModal').style.display = 'none';
    }
    async function saveBetaling() {
      const title = document.getElementById('bTitle').value.trim();
      const amount = parseFloat(document.getElementById('bAmount').value);
      if (!title) { showToast('Tittel er påkrevd'); return; }
      if (isNaN(amount) || amount < 0) { showToast('Ugyldig beløp'); return; }
      const status = document.getElementById('bStatus').value;
      const dueDate = document.getElementById('bDueDate').value || null;
      const paidDate = status === 'paid' ? (document.getElementById('bPaidDate').value || null) : null;
      const { error } = await sb.from('payments').insert({
        wedding_id: detailWeddingId,
        title,
        amount,
        status,
        due_date: dueDate,
        paid_date: paidDate,
      });
      if (error) { showToast('Feil: ' + error.message); return; }
      hideBetalingModal();
      showToast('Betaling lagret');
      renderOppdragBetalingerTab();
    }

    function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
    function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

    // ── Cmd+K global search ──
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCmdPalette(); }
      if (e.key === 'Escape') closeCmdPalette();
    });

    function openCmdPalette() {
      if (!currentUser) return;
      const overlay = document.getElementById('cmdOverlay');
      if (!overlay) return;
      overlay.classList.add('open');
      const input = document.getElementById('cmdInput');
      if (input) { input.value = ''; input.focus(); }
      runCmdSearch('');
    }

    (function() {
      const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.platform);
      const kbd = document.getElementById('searchKbd');
      if (kbd) kbd.textContent = isMac ? '⌘K' : 'Ctrl+K';
    })();

    function closeCmdPalette() {
      document.getElementById('cmdOverlay')?.classList.remove('open');
    }

    function runCmdSearch(q) {
      q = (q || '').trim().toLowerCase();
      const results = [];

      for (const w of weddings) {
        const name = w.partner2 ? `${w.partner1} & ${w.partner2}` : w.partner1;
        if (!q || name.toLowerCase().includes(q) || (w.venue||'').toLowerCase().includes(q)) {
          const date = w.wedding_date ? new Date(w.wedding_date).toLocaleDateString('nb-NO',{day:'numeric',month:'short',year:'numeric'}) : '';
          results.push({ icon:'💍', title:name, sub:[date, w.venue].filter(Boolean).join(' · '), type:'Oppdrag', action:`navigate('oppdragDetail','${w.id}')` });
        }
      }
      for (const c of contacts) {
        const name = c.partner_name ? `${c.primary_name} & ${c.partner_name}` : c.primary_name;
        if (!q || (name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.phone||'').toLowerCase().includes(q)) {
          const st = contactStatusInfo(c.status);
          results.push({ icon:'👤', title:name||c.email||'—', sub:[c.email, st.label].filter(Boolean).join(' · '), type:'Kontakt', action:`navigate('kontaktDetail','${c.id}')` });
        }
      }
      for (const d of documents) {
        if (!q || d.title.toLowerCase().includes(q)) {
          results.push({ icon:'📄', title:d.title, sub:d.status, type:'Dokument', action:`navigate('viewDoc','${d.id}')` });
        }
      }
      for (const t of messageThreads) {
        const name = threadDisplayName(t);
        if (!q || name.toLowerCase().includes(q)) {
          results.push({ icon:'💬', title:name, sub:threadSubtitle(t), type:'Melding', action:`navigate('conversation','${t.id}')` });
        }
      }

      _cmdFocusIdx = -1;
      const container = document.getElementById('cmdResults');
      if (!container) return;
      const limited = results.slice(0, 8);
      if (limited.length === 0) {
        container.innerHTML = `<div class="cmd-empty">${q ? `Ingen treff for «${esc(q)}»` : 'Begynn å skrive for å søke…'}</div>`;
        return;
      }
      container.innerHTML = limited.map((r, i) =>
        `<div class="cmd-result" id="cmd-r-${i}" onclick="closeCmdPalette();${r.action}">
          <div class="cmd-icon">${r.icon}</div>
          <div class="cmd-body">
            <div class="cmd-title">${esc(r.title)}</div>
            ${r.sub ? `<div class="cmd-sub">${esc(r.sub)}</div>` : ''}
          </div>
          <div class="cmd-type">${r.type}</div>
        </div>`
      ).join('');
    }

    function handleCmdKey(event) {
      const results = document.querySelectorAll('.cmd-result');
      if (!results.length) return;
      if (event.key === 'ArrowDown') { event.preventDefault(); _cmdFocusIdx = Math.min(_cmdFocusIdx + 1, results.length - 1); }
      else if (event.key === 'ArrowUp') { event.preventDefault(); _cmdFocusIdx = Math.max(_cmdFocusIdx - 1, 0); }
      else if (event.key === 'Enter') {
        event.preventDefault();
        const focused = document.querySelector('.cmd-result.focused');
        if (focused) { focused.click(); return; }
        if (results[0]) results[0].click();
        return;
      } else { return; }
      results.forEach((r, i) => r.classList.toggle('focused', i === _cmdFocusIdx));
      if (results[_cmdFocusIdx]) results[_cmdFocusIdx].scrollIntoView({ block:'nearest' });
    }
  </script>
</body>
</html>
