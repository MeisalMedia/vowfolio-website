<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Wedding Portal — VowFolio</title>
  <meta name="description" content="Your wedding planning hub.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;background:#FAF7F2;color:#3D3229;min-height:100vh;-webkit-font-smoothing:antialiased}
    .container{max-width:600px;margin:0 auto;padding:20px 16px 100px}
    .brand{text-align:center;padding:24px 0 12px}
    .brand-name{font-family:'Playfair Display',serif;font-size:22px;color:#9B7E5E;letter-spacing:3px;text-transform:uppercase}
    .brand-sub{font-size:11px;color:#B0A090;margin-top:2px;letter-spacing:1px;text-transform:uppercase}
    .lang-toggle{margin-top:12px;text-align:center}
    .lang-toggle button{padding:4px 12px;border:1px solid #E8DFD1;border-radius:6px;font-size:12px;cursor:pointer;font-family:Inter,sans-serif;margin:0 2px}
    .lang-toggle button.active{background:#3D3229;color:#fff}
    .lang-toggle button.inactive{background:#FAFAF8;color:#8A7D6E}

    .hero{border-radius:20px;overflow:hidden;margin-bottom:24px;position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,#D9C9B2,#9B7E5E 60%,#6B8F71);box-shadow:0 4px 20px rgba(61,50,41,0.12)}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,0.45));pointer-events:none}
    .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .hero-content{position:absolute;left:0;right:0;bottom:0;padding:20px 22px;color:#fff;z-index:1}
    .hero-couple{font-family:'Playfair Display',serif;font-size:28px;line-height:1.1;margin-bottom:6px;text-shadow:0 1px 8px rgba(0,0,0,0.3)}
    .hero-meta{font-size:13px;opacity:0.92;text-shadow:0 1px 6px rgba(0,0,0,0.3)}

    .countdown{display:flex;justify-content:center;gap:16px;margin-bottom:28px}
    .count-box{background:#fff;border-radius:14px;padding:14px 16px;min-width:70px;text-align:center;box-shadow:0 2px 12px rgba(61,50,41,0.06)}
    .count-num{font-family:'Playfair Display',serif;font-size:28px;color:#3D3229;font-weight:700;line-height:1}
    .count-label{font-size:10px;color:#8A7D6E;letter-spacing:1px;text-transform:uppercase;margin-top:4px}

    .section-title{font-family:'Playfair Display',serif;font-size:16px;color:#3D3229;margin:8px 2px 10px;letter-spacing:0.5px}
    .tile{background:#fff;border-radius:16px;padding:18px 18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(61,50,41,0.06);display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform 0.15s ease,box-shadow 0.15s ease;border:none;width:100%;font-family:inherit;text-align:left;color:inherit}
    .tile:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(61,50,41,0.1)}
    .tile:disabled{cursor:default;opacity:0.75}
    .tile-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .tile-icon.sage{background:#E8F0E6;color:#6B8F71}
    .tile-icon.gold{background:#F4ECDD;color:#9B7E5E}
    .tile-icon.muted{background:#F0EBE4;color:#8A7D6E}
    .tile-body{flex:1;min-width:0}
    .tile-title{font-size:15px;font-weight:600;color:#3D3229;margin-bottom:2px}
    .tile-status{font-size:12px;color:#8A7D6E}
    .tile-status.ok{color:#6B8F71;font-weight:500}
    .tile-status.warn{color:#B07A3E;font-weight:500}
    .tile-arrow{color:#C4B8A8;font-size:18px;flex-shrink:0}
    .tile:disabled .tile-arrow{visibility:hidden}
    .check{display:inline-block;margin-right:4px}

    .photog-card{background:#fff;border-radius:16px;padding:20px;margin-top:16px;margin-bottom:20px;box-shadow:0 2px 12px rgba(61,50,41,0.06)}
    .photog-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .photog-avatar{width:48px;height:48px;border-radius:50%;background:#F4ECDD;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:#9B7E5E;font-size:20px;font-weight:600;flex-shrink:0;overflow:hidden}
    .photog-avatar img{width:100%;height:100%;object-fit:cover}
    .photog-name{font-family:'Playfair Display',serif;font-size:18px;color:#3D3229}
    .photog-sub{font-size:12px;color:#8A7D6E;margin-top:2px}
    .photog-links{display:flex;gap:8px;flex-wrap:wrap}
    .photog-link{flex:1;min-width:120px;padding:10px 14px;background:#FAFAF8;border:1px solid #E8DFD1;border-radius:10px;text-decoration:none;color:#3D3229;font-size:13px;display:flex;align-items:center;gap:8px;transition:border-color 0.2s}
    .photog-link:hover{border-color:#9B7E5E}
    .photog-link .icon{font-size:14px;color:#9B7E5E}

    .faq-item{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 6px rgba(61,50,41,0.04)}
    .faq-q{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:500;color:#3D3229;user-select:none}
    .faq-q .plus{color:#9B7E5E;font-size:18px;transition:transform 0.2s}
    .faq-item.open .faq-q .plus{transform:rotate(45deg)}
    .faq-a{max-height:0;overflow:hidden;transition:max-height 0.25s ease;padding:0 16px}
    .faq-item.open .faq-a{max-height:300px;padding:0 16px 14px}
    .faq-a p{font-size:13px;color:#6B5E4F;line-height:1.55}

    .loading,.error-state{text-align:center;padding:64px 24px}
    .spinner{width:36px;height:36px;border:3px solid #E8DFD1;border-top-color:#6B8F71;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .state-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px}
    .state-text{font-size:14px;color:#8A7D6E;line-height:1.6}

    .footer{text-align:center;padding:32px 0 12px;font-size:11px;color:#B0A090}
    .footer a{color:#9B7E5E;text-decoration:none}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-name" id="brand-name">VowFolio</div>
    <div class="brand-sub" id="brand-sub">Wedding Photography</div>
    <div class="lang-toggle">
      <button onclick="setLang('en')" id="lang-en" class="active">EN</button>
      <button onclick="setLang('no')" id="lang-no" class="inactive">NO</button>
    </div>
  </div>
  <div id="app">
    <div class="loading"><div class="spinner"></div><p style="margin-top:16px;color:#8A7D6E">Loading your portal...</p></div>
  </div>
  <div class="footer">Powered by <a href="https://vowfolio.com" target="_blank">VowFolio</a></div>
</div>

<script>
const API = 'https://ubdqueuknaqegipnbsxc.supabase.co/functions/v1/client-portal';
const app = document.getElementById('app');

let lang = localStorage.getItem('vf_lang') || (navigator.language.startsWith('nb') || navigator.language.startsWith('no') || navigator.language.startsWith('nn') ? 'no' : 'en');

const t = {
  en: {
    loading: 'Loading your portal...',
    missingLink: 'Missing link',
    missingLinkDesc: 'Please use the link from your photographer.',
    invalidLink: 'Invalid link',
    expired: 'Link expired',
    expiredDesc: 'This portal link has expired. Please ask your photographer for a new one.',
    connError: 'Connection error',
    connErrorDesc: 'Could not reach the server. Please check your connection and try again.',

    countDays: 'days', countHours: 'hours', countMins: 'mins',
    today: 'Today!',
    daysAgo: 'days ago',

    yourWedding: 'Your wedding',
    nextSteps: 'Your to-do',

    quizTitle: 'Wedding questionnaire',
    quizNotStarted: 'Help your photographer plan your day',
    quizInProgress: 'In progress — continue where you left off',
    quizDone: 'Submitted — thank you!',

    contractTitle: 'Contract',
    contractNone: 'No contract to sign yet',
    contractPending: 'Awaiting your signature',
    contractSigned: 'Signed',

    depositTitle: 'Deposit',
    depositPending: 'Not yet paid',
    depositPaid: 'Paid',
    depositAmount: 'Amount',

    yourPhotog: 'Your photographer',
    emailUs: 'Email',
    callUs: 'Call',

    faqTitle: 'Frequently asked questions',
    faq1q: 'When will I receive my photos?',
    faq1a: 'Your photographer will share the final gallery once editing is complete. Typical turnaround is 4–8 weeks after the wedding, but check your contract for the exact timeline.',
    faq2q: 'How long is this portal link valid?',
    faq2a: 'This link stays active through your wedding day and for up to two years afterward, so you can always come back to reference your details.',
    faq3q: 'Can I share this link with family?',
    faq3a: 'This link is personal to you as the couple — it gives access to your contract and private details. We recommend keeping it between the two of you.',
    faq4q: 'What if something changes — venue, time, guest count?',
    faq4a: 'Contact your photographer directly. Updating the questionnaire is the fastest way to communicate changes, and any key updates should be confirmed via message or call.',
    faq5q: 'Who do I contact with questions?',
    faq5a: 'Your photographer is your main point of contact — use the email or phone above. For technical issues with this portal itself, email hello@vowfolio.com.',

    openCTA: 'Open',
    completeCTA: 'Complete',
    signCTA: 'Sign',
    viewCTA: 'View',
  },
  no: {
    loading: 'Laster portalen din...',
    missingLink: 'Manglende lenke',
    missingLinkDesc: 'Bruk lenken du har fått av fotografen.',
    invalidLink: 'Ugyldig lenke',
    expired: 'Lenken er utløpt',
    expiredDesc: 'Denne portalen er utløpt. Be fotografen om en ny lenke.',
    connError: 'Tilkoblingsfeil',
    connErrorDesc: 'Kunne ikke nå serveren. Sjekk nettforbindelsen og prøv igjen.',

    countDays: 'dager', countHours: 'timer', countMins: 'min',
    today: 'I dag!',
    daysAgo: 'dager siden',

    yourWedding: 'Bryllupet deres',
    nextSteps: 'Å gjøre',

    quizTitle: 'Bryllupsspørreskjema',
    quizNotStarted: 'Hjelp fotografen planlegge dagen',
    quizInProgress: 'Påbegynt — fortsett der du slapp',
    quizDone: 'Innsendt — takk!',

    contractTitle: 'Kontrakt',
    contractNone: 'Ingen kontrakt å signere ennå',
    contractPending: 'Venter på din signatur',
    contractSigned: 'Signert',

    depositTitle: 'Depositum',
    depositPending: 'Ikke betalt ennå',
    depositPaid: 'Betalt',
    depositAmount: 'Beløp',

    yourPhotog: 'Fotografen deres',
    emailUs: 'E-post',
    callUs: 'Ring',

    faqTitle: 'Ofte stilte spørsmål',
    faq1q: 'Når får vi bildene?',
    faq1a: 'Fotografen deler det ferdige galleriet når redigeringen er klar. Vanlig leveringstid er 4–8 uker etter bryllupet, men sjekk kontrakten for nøyaktig tidslinje.',
    faq2q: 'Hvor lenge er denne portal-lenken gyldig?',
    faq2a: 'Lenken fungerer gjennom bryllupsdagen og i opptil to år etterpå, slik at dere kan slå opp detaljer når som helst.',
    faq3q: 'Kan vi dele lenken med familien?',
    faq3a: 'Lenken er personlig for dere som par — den gir tilgang til kontrakt og private detaljer. Vi anbefaler å holde den mellom dere.',
    faq4q: 'Hva om noe endrer seg — lokale, tidspunkt, antall gjester?',
    faq4a: 'Ta kontakt med fotografen direkte. Å oppdatere spørreskjemaet er den raskeste måten å kommunisere endringer på, og viktige endringer bør bekreftes på melding eller telefon.',
    faq5q: 'Hvem kontakter vi ved spørsmål?',
    faq5a: 'Fotografen er deres primære kontakt — bruk e-post eller telefon over. Ved tekniske problemer med selve portalen, send e-post til hello@vowfolio.com.',

    openCTA: 'Åpne',
    completeCTA: 'Fullfør',
    signCTA: 'Signer',
    viewCTA: 'Se',
  },
};

function tr(key) { return t[lang][key] || t.en[key] || key; }

function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('vf_lang', newLang);
  document.getElementById('lang-en').className = newLang === 'en' ? 'active' : 'inactive';
  document.getElementById('lang-no').className = newLang === 'no' ? 'active' : 'inactive';
  if (lastData) render(lastData);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  const locale = lang === 'no' ? 'nb-NO' : 'en-GB';
  return d.toLocaleDateString(locale, opts);
}

function daysUntil(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const today = new Date();
  d.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  return Math.round((d - today) / (1000 * 60 * 60 * 24));
}

// Token resolution: /p/{token} path or ?token= query. URL stays intact so bookmarks work.
let token = null;
(function resolveToken() {
  const path = location.pathname;
  const m = path.match(/^\/p\/([a-f0-9]{8,128})\/?$/);
  if (m) {
    token = m[1];
    return;
  }
  const qs = new URLSearchParams(location.search);
  const qt = qs.get('token');
  if (qt) token = qt;
})();

let lastData = null;

function showError(title, desc) {
  app.innerHTML = `
    <div class="error-state">
      <div class="state-title">${title}</div>
      <div class="state-text">${desc}</div>
    </div>`;
}

async function loadOverview() {
  if (!token) {
    showError(tr('missingLink'), tr('missingLinkDesc'));
    return;
  }
  try {
    const res = await fetch(`${API}?action=overview&token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok || data.error) {
      if (data.error === 'expired') return showError(tr('expired'), tr('expiredDesc'));
      return showError(tr('invalidLink'), data.message || tr('missingLinkDesc'));
    }
    lastData = data;
    render(data);
  } catch (e) {
    showError(tr('connError'), tr('connErrorDesc'));
  }
}

function renderCountdown(isoDate) {
  const days = daysUntil(isoDate);
  if (days === null) return '';
  if (days === 0) {
    return `<div class="countdown"><div class="count-box"><div class="count-num">${tr('today')}</div></div></div>`;
  }
  if (days < 0) {
    return `<div class="countdown"><div class="count-box"><div class="count-num">${Math.abs(days)}</div><div class="count-label">${tr('daysAgo')}</div></div></div>`;
  }
  return `<div class="countdown"><div class="count-box"><div class="count-num">${days}</div><div class="count-label">${tr('countDays')}</div></div></div>`;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function render(data) {
  const w = data.wedding || {};
  const p = data.photographer || {};
  const s = data.status || {};
  const coupleName = [w.partner1, w.partner2].filter(Boolean).join(' & ');

  // Update brand
  if (p.name) document.getElementById('brand-name').textContent = p.name;

  const heroBg = w.coverImagePath
    ? `<img src="${escapeHtml(w.coverImagePath)}" alt="">`
    : '';

  const metaParts = [];
  if (w.venue) metaParts.push(escapeHtml(w.venue));
  if (w.weddingDate) metaParts.push(formatDate(w.weddingDate));

  const intake = s.intake || {};
  const intakeStatus = intake.submitted ? 'ok' : (intake.started ? 'warn' : '');
  const intakeText = intake.submitted ? tr('quizDone') : (intake.started ? tr('quizInProgress') : tr('quizNotStarted'));
  const intakeCheck = intake.submitted ? '<span class="check">✓</span>' : '';

  const contract = s.contract || { status: 'none' };
  const contractDisabled = contract.status === 'none' || contract.status === 'signed';
  const contractClass = contract.status === 'signed' ? 'ok' : (contract.status === 'pending' ? 'warn' : '');
  const contractText = contract.status === 'signed' ? tr('contractSigned')
    : contract.status === 'pending' ? tr('contractPending')
    : tr('contractNone');
  const contractCheck = contract.status === 'signed' ? '<span class="check">✓</span>' : '';

  const deposit = s.deposit || { paid: false };
  const depositText = deposit.paid ? tr('depositPaid') : tr('depositPending');
  const depositCheck = deposit.paid ? '<span class="check">✓</span>' : '';
  const depositClass = deposit.paid ? 'ok' : 'warn';

  const photogInitial = p.name ? p.name.charAt(0).toUpperCase() : 'V';
  const avatarInner = p.logoUrl ? `<img src="${escapeHtml(p.logoUrl)}" alt="">` : escapeHtml(photogInitial);

  const photogLinks = [];
  if (p.email) photogLinks.push(`<a class="photog-link" href="mailto:${encodeURIComponent(p.email)}"><span class="icon">✉</span> ${tr('emailUs')}</a>`);
  if (p.phone) photogLinks.push(`<a class="photog-link" href="tel:${encodeURIComponent(p.phone)}"><span class="icon">📞</span> ${tr('callUs')}</a>`);

  const faqs = [1,2,3,4,5].map(n => `
    <div class="faq-item">
      <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
        <span>${tr('faq'+n+'q')}</span><span class="plus">+</span>
      </div>
      <div class="faq-a"><p>${tr('faq'+n+'a')}</p></div>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="hero">
      ${heroBg}
      <div class="hero-content">
        <div class="hero-couple">${escapeHtml(coupleName)}</div>
        <div class="hero-meta">${metaParts.join(' · ')}</div>
      </div>
    </div>

    ${renderCountdown(w.weddingDate)}

    <div class="section-title">${tr('nextSteps')}</div>

    <button class="tile" onclick="openIntake()">
      <div class="tile-icon sage">📋</div>
      <div class="tile-body">
        <div class="tile-title">${tr('quizTitle')}</div>
        <div class="tile-status ${intakeStatus}">${intakeCheck}${intakeText}</div>
      </div>
      <div class="tile-arrow">›</div>
    </button>

    <button class="tile" ${contractDisabled ? 'disabled' : ''} onclick="openContract(${contract.toSign ? `'${contract.toSign.id}'` : 'null'})">
      <div class="tile-icon gold">📝</div>
      <div class="tile-body">
        <div class="tile-title">${tr('contractTitle')}</div>
        <div class="tile-status ${contractClass}">${contractCheck}${contractText}</div>
      </div>
      <div class="tile-arrow">›</div>
    </button>

    <button class="tile" disabled>
      <div class="tile-icon muted">💳</div>
      <div class="tile-body">
        <div class="tile-title">${tr('depositTitle')}</div>
        <div class="tile-status ${depositClass}">${depositCheck}${depositText}</div>
      </div>
      <div class="tile-arrow">›</div>
    </button>

    <div class="photog-card">
      <div class="section-title" style="margin:0 0 12px">${tr('yourPhotog')}</div>
      <div class="photog-row">
        <div class="photog-avatar">${avatarInner}</div>
        <div>
          <div class="photog-name">${escapeHtml(p.name || '')}</div>
        </div>
      </div>
      <div class="photog-links">${photogLinks.join('')}</div>
    </div>

    <div class="section-title">${tr('faqTitle')}</div>
    ${faqs}
  `;
}

async function openIntake() {
  if (!token) return;
  try {
    const res = await fetch(`${API}?action=open-intake`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    }
  } catch (e) {
    alert(tr('connError'));
  }
}

async function openContract(documentId) {
  if (!token || !documentId) return;
  try {
    const res = await fetch(`${API}?action=open-contract`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, document_id: documentId }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    }
  } catch (e) {
    alert(tr('connError'));
  }
}

setLang(lang);
loadOverview();
</script>
</body>
</html>
