  }
}

setLang(lang);

// On init: if there's a saved auth-progress (user got OTP, switched to Mail,
// browser killed the tab), restore the code-input step so they don't have to
// start over. Only kicks in when there's no valid session yet.
(function initPortal() {
  const inProgress = loadAuthProgress();
  const hasSession = !!getSession();
  if (!hasSession && inProgress?.email) {
    authState = {
      ...authState,
      step: 'code',
      email: inProgress.email,
      codeRequestedAt: inProgress.codeRequestedAt || 0,
      resendCooldownUntil: inProgress.resendCooldownUntil || 0,
      error: null,
      info: tr('authResumed'),
      loading: false,
      codeExpired: false,
    };
    renderAuthScreen();
    updateFooterLogout();
    return;
  }
  loadOverview()
    .then(restoreChatState)
    .then(loadGroupPhotosStatus)
    .catch(err => console.error('[portal] loadOverview/restoreChatState failed:', err));
})();

// ============================================================
// Group photos quiz
// ============================================================

const GP_TOTAL_STEPS = 5;
const GP_MAX_MUST_HAVE = 5;

let gpState = null;

function gpInitState() {
  return {
    loaded: false,
    loading: false,
    error: null,
    step: 1,
    familySize: null,
    items: [],
    prefillSkipped: false,
    vipListRaw: null,
    submitted: false,
    isSubmitting: false,
    showSubmittedScreen: false,
    addingNew: false,
    addingTitle: '',
    addingNotes: '',
    addingPeople: '',
  };
}

function gpDraftKey() { return 'gp_draft_' + (token || 'unknown'); }

function gpSaveDraft() {
  if (!gpState) return;
  if (gpState.submitted && !gpState.showSubmittedScreen) {
    // After re-submission completes, draft is cleared elsewhere
    return;
  }
  try {
    localStorage.setItem(gpDraftKey(), JSON.stringify({
      step: gpState.step,
      familySize: gpState.familySize,
      items: gpState.items,
    }));
  } catch (_) {}
}

function gpLoadDraft() {
  try {
    const raw = localStorage.getItem(gpDraftKey());
    if (!raw) return null;
    const d = JSON.parse(raw);
    return d && Array.isArray(d.items) ? d : null;
  } catch (_) { return null; }
}

function gpClearDraft() {
  try { localStorage.removeItem(gpDraftKey()); } catch (_) {}
}

function gpSuggestions(familySize) {
  const NO = {
    core: ['Brudens foreldre', 'Brudgommens foreldre', 'Begges foreldre sammen', 'Brudens søsken', 'Brudgommens søsken', 'Brudepiker'],
    extended: ['Brudens foreldre', 'Brudgommens foreldre', 'Begges foreldre sammen', 'Alle besteforeldre', 'Brudens søsken', 'Brudgommens søsken', 'Brudepiker', 'Hele familien'],
    large: ['Brudens foreldre', 'Brudgommens foreldre', 'Begges foreldre sammen', 'Alle besteforeldre', 'Brudens søsken', 'Brudgommens søsken', 'Brudepiker', 'Forlovere', 'Onkler og tanter', 'Hele familien'],
  };
  const EN = {
    core: ['Bride\'s parents', 'Groom\'s parents', 'Both sets of parents together', 'Bride\'s siblings', 'Groom\'s siblings', 'Bridesmaids'],
    extended: ['Bride\'s parents', 'Groom\'s parents', 'Both sets of parents together', 'All grandparents', 'Bride\'s siblings', 'Groom\'s siblings', 'Bridesmaids', 'Whole family'],
    large: ['Bride\'s parents', 'Groom\'s parents', 'Both sets of parents together', 'All grandparents', 'Bride\'s siblings', 'Groom\'s siblings', 'Bridesmaids', 'Groomsmen', 'Aunts and uncles', 'Whole family'],
  };
  return (lang === 'no' ? NO : EN)[familySize] || [];
}

async function loadGroupPhotosStatus() {
  if (!token) return;
  try {
    const res = await authedFetch(`${API}?action=group-photos-quiz&token=${encodeURIComponent(token)}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.error) return;
    const el = document.getElementById('group-photos-status');
    if (!el) return;
    if (data.submitted) {
      el.textContent = `${data.items.length} ${tr('gpTileSubmitted')}`;
    } else {
      const draft = gpLoadDraft();
      const draftCount = draft && draft.items ? draft.items.length : 0;
      const apiCount = (data.items || []).length;
      const count = Math.max(draftCount, apiCount);
      if (count > 0) {
        el.textContent = `${count} ${tr('gpTileInProgress')}`;
      } else {
        el.textContent = tr('gpTileNotStarted');
      }
    }
  } catch (e) { console.error('[gp] status load failed:', e); }
}

async function openGroupPhotos() {
  const modal = document.getElementById('gp-modal');
  if (!modal) return;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (!gpState || !gpState.loaded) {
    gpState = gpInitState();
    gpState.loading = true;
    gpRender();
    try {
      const res = await authedFetch(`${API}?action=group-photos-quiz&token=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (data.error) {
        gpState.loading = false;
        gpState.error = tr('gpLoadError');
        gpRender();
        return;
      }
      gpState.loading = false;
      gpState.loaded = true;
      gpState.submitted = !!data.submitted;
      gpState.prefillSkipped = !!data.prefillSkipped;
      gpState.vipListRaw = data.vipListRaw || null;
      const apiItems = (data.items || []).map(i => ({
        title: i.title || '',
        notes: i.notes || '',
        must_have: !!i.must_have,
        people_count: typeof i.people_count === 'number' ? i.people_count : null,
      }));
      const draft = gpLoadDraft();
      if (gpState.submitted) {
        gpState.items = apiItems;
        gpState.showSubmittedScreen = true;
      } else if (draft && draft.items.length > 0) {
        gpState.items = draft.items;
        gpState.familySize = draft.familySize || null;
        gpState.step = draft.step || 1;
      } else if (apiItems.length > 0) {
        // pre-filled from vip_list
        gpState.items = apiItems;
        gpState.step = 2; // skip family size — they have items already
      }
      gpRender();
    } catch (e) {
      gpState.loading = false;
      gpState.error = tr('gpLoadError');
      gpRender();
    }
  } else {
    gpRender();
  }
}

function closeGroupPhotos() {
  const modal = document.getElementById('gp-modal');
  if (!modal) return;
  modal.classList.remove('open');
  document.body.style.overflow = '';
  gpSaveDraft();
}

function gpModalBgClick(e) {
  if (e.target.id === 'gp-modal') closeGroupPhotos();
}

function gpEscape(s) { return escapeHtml(s == null ? '' : String(s)); }

function gpRender() {
  if (!gpState) return;
  const stepLabel = document.getElementById('gp-step-label');
  const progress = document.getElementById('gp-progress');
  const body = document.getElementById('gp-body');
  const footer = document.getElementById('gp-footer');

  if (gpState.loading) {
    stepLabel.textContent = '';
    progress.innerHTML = '';
    body.innerHTML = `<div class="gp-loading">${gpEscape(tr('moodboardLoading') || 'Loading…')}</div>`;
    footer.innerHTML = '';
    return;
  }

  if (gpState.showSubmittedScreen) {
    stepLabel.textContent = '';
    progress.innerHTML = '';
    body.innerHTML = `
      <div style="text-align:center;padding:30px 8px 20px">
        <div style="font-size:48px;margin-bottom:12px">✓</div>
        <div class="gp-title" style="margin-bottom:6px">${gpEscape(tr('gpSubmittedTitle'))}</div>
        <div class="gp-desc" style="margin-bottom:18px">${gpEscape(tr('gpSubmittedDesc'))}</div>
        <div class="gp-summary-section">
          <div class="gp-summary-heading">${gpState.items.length} ${gpEscape(tr('gpStep5OtherHeading')).toLowerCase()}</div>
          ${gpState.items.map(i => `
            <div class="gp-item ${i.must_have ? 'must-have' : ''}" style="cursor:default">
              ${i.must_have ? '<span style="color:#B88E4D;font-size:16px">★</span>' : '<span style="width:16px"></span>'}
              <div class="gp-item-text">${gpEscape(i.title)}${i.notes ? `<div class="gp-item-notes">${gpEscape(i.notes)}</div>` : ''}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    footer.innerHTML = `
      <button class="gp-btn gp-btn-back" onclick="gpEditAfterSubmit()">${gpEscape(tr('gpSubmittedEdit'))}</button>
      <button class="gp-btn gp-btn-next" onclick="closeGroupPhotos()">${gpEscape(tr('gpSubmittedClose'))}</button>
    `;
    return;
  }

  if (gpState.error) {
    body.innerHTML = `<div class="gp-error">${gpEscape(gpState.error)}</div>`;
    footer.innerHTML = `<button class="gp-btn gp-btn-next" onclick="closeGroupPhotos()">${gpEscape(tr('gpClose'))}</button>`;
    return;
  }

  stepLabel.textContent = `${gpEscape(tr('gpStepOf'))} ${gpState.step}/${GP_TOTAL_STEPS}`;
  progress.innerHTML = '';
  for (let i = 1; i <= GP_TOTAL_STEPS; i++) {
    const cls = i < gpState.step ? 'done' : (i === gpState.step ? 'current' : '');
    progress.innerHTML += `<div class="gp-progress-bar ${cls}"></div>`;
  }

  if (gpState.step === 1) gpRenderStep1(body, footer);
  else if (gpState.step === 2) gpRenderStep2(body, footer);
  else if (gpState.step === 3) gpRenderStep3(body, footer);
  else if (gpState.step === 4) gpRenderStep4(body, footer);
  else if (gpState.step === 5) gpRenderStep5(body, footer);
}

function gpRenderStep1(body, footer) {
  const fam = gpState.familySize;
  body.innerHTML = `
    <div class="gp-title">${gpEscape(tr('gpStep1Title'))}</div>
    <div class="gp-desc">${gpEscape(tr('gpStep1Desc'))}</div>
    <div class="gp-fam-options">
      <button class="gp-fam-option ${fam === 'core' ? 'selected' : ''}" onclick="gpPickFamily('core')">
        <div class="gp-fam-option-title">${gpEscape(tr('gpFamCore'))}</div>
        <div class="gp-fam-option-sub">${gpEscape(tr('gpFamCoreSub'))}</div>
      </button>
      <button class="gp-fam-option ${fam === 'extended' ? 'selected' : ''}" onclick="gpPickFamily('extended')">
        <div class="gp-fam-option-title">${gpEscape(tr('gpFamExtended'))}</div>
        <div class="gp-fam-option-sub">${gpEscape(tr('gpFamExtendedSub'))}</div>
      </button>
      <button class="gp-fam-option ${fam === 'large' ? 'selected' : ''}" onclick="gpPickFamily('large')">
        <div class="gp-fam-option-title">${gpEscape(tr('gpFamLarge'))}</div>
        <div class="gp-fam-option-sub">${gpEscape(tr('gpFamLargeSub'))}</div>
      </button>
    </div>
  `;
  footer.innerHTML = `
    <button class="gp-btn gp-btn-next" onclick="gpStepNext()" ${fam ? '' : 'disabled'}>${gpEscape(tr('gpNext'))}</button>
  `;
}

function gpPickFamily(size) {
  gpState.familySize = size;
  // Pre-fill items with suggestions if items list is empty
  if (gpState.items.length === 0) {
    gpState.items = gpSuggestions(size).map(title => ({
      title, notes: '', must_have: false, people_count: null,
    }));
  }
  gpSaveDraft();
  gpRender();
}

function gpRenderStep2(body, footer) {
  let banner = '';
  if (gpState.prefillSkipped && gpState.vipListRaw) {
    banner = `
      <div class="gp-banner">
        <div class="gp-banner-title">${gpEscape(tr('gpPrefillBannerTitle'))}</div>
        <div class="gp-banner-text">${gpEscape(tr('gpPrefillBannerText'))}</div>
        <div class="gp-banner-text" style="margin-top:8px;padding:8px;background:#fff;border-radius:8px;font-style:italic">${gpEscape(gpState.vipListRaw)}</div>
      </div>
    `;
  }
  const itemsHtml = gpState.items.map((it, idx) => `
    <div class="gp-item">
      <button class="gp-item-checkbox checked" onclick="gpRemoveItem(${idx})" aria-label="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <input class="gp-item-input" value="${gpEscape(it.title)}" oninput="gpUpdateItemTitle(${idx}, this.value)" onblur="gpSaveDraft()" placeholder="${gpEscape(tr('gpItemPlaceholder'))}">
    </div>
  `).join('');
  body.innerHTML = `
    <div class="gp-title">${gpEscape(tr('gpStep2Title'))}</div>
    <div class="gp-desc">${gpEscape(tr('gpStep2Desc'))}</div>
    ${banner}
    <div class="gp-items">${itemsHtml || `<div class="gp-desc" style="text-align:center;padding:20px 0">—</div>`}</div>
  `;
  footer.innerHTML = `
    <button class="gp-btn gp-btn-back" onclick="gpStepBack()">${gpEscape(tr('gpBack'))}</button>
    <button class="gp-btn gp-btn-next" onclick="gpStepNext()">${gpEscape(tr('gpNext'))}</button>
  `;
}

function gpUpdateItemTitle(idx, val) {
  if (gpState.items[idx]) gpState.items[idx].title = val;
}

function gpRemoveItem(idx) {
  gpState.items.splice(idx, 1);
  gpSaveDraft();
  gpRender();
}

function gpRenderStep3(body, footer) {
  const customItems = gpState.items.map((it, idx) => `
    <div class="gp-item">
      <div class="gp-item-text">
        ${gpEscape(it.title)}
        ${it.notes ? `<div class="gp-item-notes">${gpEscape(it.notes)}</div>` : ''}
      </div>
      ${it.people_count ? `<span class="gp-item-people">${it.people_count}</span>` : ''}
      <button class="gp-item-remove" onclick="gpRemoveItem(${idx})" aria-label="Remove">×</button>
    </div>
  `).join('');
  let addForm = '';
  if (gpState.addingNew) {
    addForm = `
      <div class="gp-add-form">
        <input type="text" id="gp-add-title" value="${gpEscape(gpState.addingTitle)}" placeholder="${gpEscape(tr('gpStep3PlaceholderTitle'))}" oninput="gpState.addingTitle=this.value" autofocus>
        <textarea id="gp-add-notes" rows="2" placeholder="${gpEscape(tr('gpStep3PlaceholderNotes'))}" oninput="gpState.addingNotes=this.value">${gpEscape(gpState.addingNotes)}</textarea>
        <div class="gp-add-form-row">
          <input type="number" min="1" max="50" value="${gpEscape(gpState.addingPeople)}" placeholder="${gpEscape(tr('gpStep3PeopleCount'))}" oninput="gpState.addingPeople=this.value" style="width:140px">
        </div>
        <div class="gp-add-form-actions">
          <button class="gp-add-form-cancel" onclick="gpCancelAdd()">${gpEscape(tr('gpStep3Cancel'))}</button>
          <button class="gp-add-form-save" onclick="gpSaveAdd()">${gpEscape(tr('gpStep3Save'))}</button>
        </div>
      </div>
    `;
  } else {
    addForm = `<button class="gp-add-btn" onclick="gpStartAdd()">+ ${gpEscape(tr('gpStep3AddBtn'))}</button>`;
  }
  body.innerHTML = `
    <div class="gp-title">${gpEscape(tr('gpStep3Title'))}</div>
    <div class="gp-desc">${gpEscape(tr('gpStep3Desc'))}</div>
    ${addForm}
    <div class="gp-items" style="margin-top:12px">${customItems}</div>
  `;
  footer.innerHTML = `
    <button class="gp-btn gp-btn-back" onclick="gpStepBack()">${gpEscape(tr('gpBack'))}</button>
    <button class="gp-btn gp-btn-next" onclick="gpStepNext()">${gpEscape(tr('gpNext'))}</button>
  `;
}

function gpStartAdd() {
  gpState.addingNew = true;
  gpState.addingTitle = '';
  gpState.addingNotes = '';
  gpState.addingPeople = '';
  gpRender();
}

function gpCancelAdd() {
  gpState.addingNew = false;
  gpRender();
}

function gpSaveAdd() {
  const title = (gpState.addingTitle || '').trim();
  if (!title) return;
  const peopleNum = parseInt(gpState.addingPeople, 10);
  gpState.items.push({
    title: title.slice(0, 200),
    notes: (gpState.addingNotes || '').trim().slice(0, 500),
    must_have: false,
    people_count: isNaN(peopleNum) ? null : peopleNum,
  });
  gpState.addingNew = false;
  gpState.addingTitle = '';
  gpState.addingNotes = '';
  gpState.addingPeople = '';
  gpSaveDraft();
  gpRender();
}

function gpRenderStep4(body, footer) {
  const mustCount = gpState.items.filter(i => i.must_have).length;
  const reachedMax = mustCount >= GP_MAX_MUST_HAVE;
  const itemsHtml = gpState.items.map((it, idx) => {
    const star = it.must_have ? '★' : '☆';
    const cls = it.must_have ? 'active' : (reachedMax ? 'disabled' : '');
    return `
      <div class="gp-item ${it.must_have ? 'must-have' : ''}">
        <button class="gp-item-star ${cls}" onclick="gpToggleMustHave(${idx})" aria-label="Star">${star}</button>
        <div class="gp-item-text">${gpEscape(it.title)}${it.notes ? `<div class="gp-item-notes">${gpEscape(it.notes)}</div>` : ''}</div>
      </div>
    `;
  }).join('');
  body.innerHTML = `
    <div class="gp-title">${gpEscape(tr('gpStep4Title'))}</div>
    <div class="gp-desc">${gpEscape(tr('gpStep4Desc'))}</div>
    <div class="gp-musthave-counter"><strong>${mustCount}</strong> ${gpEscape(tr('gpStep4Counter'))}</div>
    <div class="gp-items">${itemsHtml}</div>
  `;
  footer.innerHTML = `
    <button class="gp-btn gp-btn-back" onclick="gpStepBack()">${gpEscape(tr('gpBack'))}</button>
    <button class="gp-btn gp-btn-next" onclick="gpStepNext()">${gpEscape(tr('gpNext'))}</button>
  `;
}

function gpToggleMustHave(idx) {
  const it = gpState.items[idx];
  if (!it) return;
  if (!it.must_have) {
    const count = gpState.items.filter(x => x.must_have).length;
    if (count >= GP_MAX_MUST_HAVE) return;
  }
  it.must_have = !it.must_have;
  gpSaveDraft();
  gpRender();
}

function gpEstimateMinutes() {
  const must = gpState.items.filter(i => i.must_have).length;
  const other = gpState.items.length - must;
  const raw = (must * 3) + (other * 2);
  return Math.max(5, Math.ceil(raw / 5) * 5);
}

function gpRenderStep5(body, footer) {
  const must = gpState.items.filter(i => i.must_have);
  const other = gpState.items.filter(i => !i.must_have);
  const mins = gpEstimateMinutes();
  const itemRow = (it) => `
    <div class="gp-item ${it.must_have ? 'must-have' : ''}" style="cursor:default">
      ${it.must_have ? '<span style="color:#B88E4D;font-size:16px">★</span>' : '<span style="width:16px"></span>'}
      <div class="gp-item-text">${gpEscape(it.title)}${it.notes ? `<div class="gp-item-notes">${gpEscape(it.notes)}</div>` : ''}${it.people_count ? `<div class="gp-item-notes">${it.people_count} ${gpEscape(tr('gpStep3PeopleCount')).toLowerCase()}</div>` : ''}</div>
    </div>
  `;
  body.innerHTML = `
    <div class="gp-title" style="margin-bottom:4px">${gpEscape(tr('gpStep5Title'))}</div>
    <div class="gp-edit-hint" style="text-align:left;margin:0 0 10px">${gpEscape(tr('gpStep5EditHint'))}</div>
    <div class="gp-time-row">
      <span class="gp-time-row-icon">⏱</span>
      <span><strong>${gpEscape(tr('gpStep5TimeLabel'))} ${mins} ${gpEscape(tr('gpStep5TimeUnit'))}</strong> ${gpEscape(tr('gpStep5TimeContext'))}</span>
    </div>
    ${must.length > 0 ? `
      <div class="gp-summary-section">
        <div class="gp-summary-heading">★ ${gpEscape(tr('gpStep5MustHaveHeading'))}</div>
        <div class="gp-items">${must.map(itemRow).join('')}</div>
      </div>
    ` : ''}
    ${other.length > 0 ? `
      <div class="gp-summary-section">
        <div class="gp-summary-heading">${gpEscape(tr('gpStep5OtherHeading'))}</div>
        <div class="gp-items">${other.map(itemRow).join('')}</div>
      </div>
    ` : ''}
    ${gpState.error ? `<div class="gp-error" style="margin-top:14px">${gpEscape(gpState.error)}</div>` : ''}
  `;
  footer.innerHTML = `
    <button class="gp-btn gp-btn-back" onclick="gpStepBack()">${gpEscape(tr('gpBack'))}</button>
    <button class="gp-btn gp-btn-submit" onclick="gpSubmit()" ${gpState.isSubmitting || gpState.items.length === 0 ? 'disabled' : ''}>${gpEscape(gpState.submitted ? tr('gpResubmit') : tr('gpSubmit'))}</button>
  `;
}

function gpStepNext() {
  if (gpState.step === 1 && !gpState.familySize) return;
  if (gpState.step === 4) {
    const mustCount = gpState.items.filter(i => i.must_have).length;
    if (mustCount > GP_MAX_MUST_HAVE) {
      gpState.error = tr('gpTooManyMustHave');
      gpRender();
      return;
    }
  }
  gpState.step = Math.min(GP_TOTAL_STEPS, gpState.step + 1);
  gpState.error = null;
  gpSaveDraft();
  gpRender();
}

function gpStepBack() {
  gpState.step = Math.max(1, gpState.step - 1);
  gpState.error = null;
  gpSaveDraft();
  gpRender();
}

function gpEditAfterSubmit() {
  gpState.showSubmittedScreen = false;
  gpState.step = 2; // Go straight to editing
  gpRender();
}

async function gpSubmit() {
  if (gpState.isSubmitting) return;
  if (gpState.items.length === 0) {
    gpState.error = tr('gpEmpty');
    gpRender();
    return;
  }
  const mustCount = gpState.items.filter(i => i.must_have).length;
  if (mustCount > GP_MAX_MUST_HAVE) {
    gpState.error = tr('gpTooManyMustHave');
    gpRender();
    return;
  }
  gpState.isSubmitting = true;
  gpState.error = null;
  gpRender();
  try {
    const cleanItems = gpState.items.map(i => ({
      title: (i.title || '').trim().slice(0, 200),
      notes: (i.notes || '').trim().slice(0, 500),
      must_have: !!i.must_have,
      people_count: typeof i.people_count === 'number' ? i.people_count : null,
    })).filter(i => i.title.length > 0);
    const res = await authedFetch(`${API}?action=group-photos-submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, items: cleanItems }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      gpState.isSubmitting = false;
      gpState.error = data.message || tr('gpSendError');
      gpRender();
      return;
    }
    gpState.isSubmitting = false;
    gpState.submitted = true;
    gpState.showSubmittedScreen = true;
    gpClearDraft();
    gpRender();
    // Update tile status
    const el = document.getElementById('group-photos-status');
    if (el) el.textContent = `${cleanItems.length} ${tr('gpTileSubmitted')}`;
  } catch (e) {
    gpState.isSubmitting = false;
    gpState.error = tr('gpSendError');
    gpRender();
  }
}
</script>
