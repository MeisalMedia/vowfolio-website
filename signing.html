<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signer dokument | VowFolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #FAF7F2;
      color: #3D3229;
      min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

    /* Brand header */
    .brand {
      text-align: center;
      padding: 32px 0 24px;
      border-bottom: 1px solid #E8E0D6;
      margin-bottom: 32px;
    }
    .brand h1 { font-size: 28px; font-weight: 400; color: #9B7E5E; letter-spacing: 2px; }
    .brand p { font-size: 13px; color: #8A7D72; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(61,50,41,0.08);
      padding: 32px;
      margin-bottom: 24px;
    }
    .card h2 { margin-bottom: 4px; color: #9B7E5E; font-size: 20px; }
    .card .subtitle { font-size: 13px; color: #8A7D72; margin-bottom: 20px; }

    /* Contract body */
    .contract-body {
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-wrap;
    }
    .contract-body h1, .contract-body h2, .contract-body h3 { margin: 20px 0 8px; color: #3D3229; }
    .contract-body p { margin-bottom: 12px; }
    .contract-body strong { color: #3D3229; }

    /* Collapsible contract */
    .contract-collapsed {
      max-height: 300px;
      overflow: hidden;
      position: relative;
    }
    .contract-collapsed::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(transparent, #fff);
    }
    .contract-expanded {
      max-height: none;
    }
    .contract-expanded::after {
      display: none;
    }
    .toggle-contract {
      display: block;
      width: 100%;
      padding: 12px;
      background: none;
      border: 1px solid #E8E0D6;
      border-radius: 8px;
      font-family: Georgia, serif;
      font-size: 14px;
      color: #9B7E5E;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }
    .toggle-contract:hover { background: #FAF7F2; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid #E8E0D6;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-family: Georgia, serif;
      font-size: 15px;
      color: #8A7D72;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active { color: #9B7E5E; border-bottom-color: #9B7E5E; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Type signature */
    .sig-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #D4C9BC;
      border-radius: 8px;
      font-size: 16px;
      font-family: Georgia, serif;
      background: #FAF7F2;
      outline: none;
      transition: border-color 0.2s;
    }
    .sig-input:focus { border-color: #9B7E5E; }
    .sig-preview {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #D4C9BC;
      border-radius: 8px;
      margin-top: 16px;
      padding: 16px;
      font-size: 32px;
      font-style: italic;
      color: #3D3229;
    }

    /* Draw signature */
    .canvas-wrap {
      border: 1px solid #D4C9BC;
      border-radius: 8px;
      overflow: hidden;
      touch-action: none;
      cursor: crosshair;
    }
    .canvas-wrap canvas { display: block; width: 100%; height: 200px; background: #fff; }
    .clear-btn {
      background: none;
      border: 1px solid #D4C9BC;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: Georgia, serif;
      color: #8A7D72;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Button */
    .btn {
      display: inline-block;
      background: #9B7E5E;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-family: Georgia, serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .btn:hover { background: #8A6E4E; }
    .btn:disabled { background: #C4B5A5; cursor: not-allowed; }

    .sign-area { text-align: center; padding-top: 16px; }
    .signer-info { font-size: 13px; color: #8A7D72; text-align: center; margin-bottom: 16px; }
    .status-msg { margin-top: 12px; font-size: 13px; color: #8A7D72; }

    /* Success / Error */
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #6B8F71;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .success-icon svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes scaleIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .error-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
    .loading { text-align: center; padding: 60px 24px; color: #9B7E5E; font-size: 14px; }
    .powered { text-align: center; padding: 16px; font-size: 10px; color: #D5CBBF; }
    .powered a { color: #C4B5A3; text-decoration: none; }

    /* Spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <h1>VowFolio</h1>
      <p>Wedding Photography</p>
    </div>

    <div id="loadingCard" class="card">
      <div class="loading">Laster dokument...</div>
    </div>

    <div id="errorCard" class="card" style="display:none;">
      <div class="error-icon">&#9888;</div>
      <h2 style="text-align:center;color:#9B7E5E;" id="errorTitle">Feil</h2>
      <p style="text-align:center;color:#8A7D72;line-height:1.6;" id="errorMsg"></p>
    </div>

    <div id="successCard" class="card" style="display:none;">
      <div style="text-align:center;padding:24px 0;">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h2 style="color:#9B7E5E;margin-bottom:8px;">Dokumentet er signert</h2>
        <p style="color:#8A7D72;line-height:1.6;" id="successMsg"></p>
        <p style="color:#8A7D72;font-size:13px;margin-top:12px;">Du kan lukke denne siden. Fotografen vil bli varslet.</p>
      </div>
    </div>

    <div id="contractCard" class="card" style="display:none;">
      <h2 id="docTitle">Dokument</h2>
      <p class="subtitle">Vennligst les gjennom og signer nedenfor</p>
      <div class="contract-body contract-collapsed" id="contractBody"></div>
      <button class="toggle-contract" id="toggleBtn" onclick="toggleContract()">Vis hele kontrakten</button>
    </div>

    <div id="signCard" class="card" style="display:none;">
      <h3 style="margin-bottom:4px;color:#9B7E5E;">Din signatur</h3>
      <p class="signer-info">Signerer som: <strong id="signerName"></strong></p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab(0)" id="tab0">Skriv navn</button>
        <button class="tab" onclick="switchTab(1)" id="tab1">Tegn</button>
      </div>

      <div id="tc0" class="tab-content active">
        <input class="sig-input" type="text" id="typedName" placeholder="Skriv ditt fulle navn" oninput="updatePreview()">
        <div class="sig-preview" id="sigPreview"></div>
      </div>

      <div id="tc1" class="tab-content">
        <div class="canvas-wrap">
          <canvas id="sigCanvas"></canvas>
        </div>
        <button class="clear-btn" onclick="clearCanvas()">Tøm</button>
      </div>

      <div class="sign-area">
        <button class="btn" id="signBtn" onclick="submitSignature()">Signer dokument</button>
        <p class="status-msg" id="statusMsg"></p>
      </div>
    </div>

    <div class="powered">Drevet av <a href="https://vowfolio.com" target="_blank" rel="noopener">VowFolio</a></div>
  </div>

  <script>
    var API = 'https://ubdqueuknaqegipnbsxc.supabase.co/functions/v1/sign-document';
    var path = window.location.pathname;
    var match = path.match(/\/s\/([a-f0-9]+)/);
    var token = match ? match[1] : null;

    // Also check query param (legacy support)
    if (!token) {
      var params = new URLSearchParams(window.location.search);
      token = params.get('token');
    }

    var currentTab = 0;
    var drawing = false;
    var hasDrawn = false;
    var signerId = null;
    var canvas, ctx;

    if (!token) {
      showError('Manglende token', 'Ingen signeringstoken ble oppgitt. Bruk lenken fra e-posten din.');
    } else {
      loadDocument();
    }

    async function loadDocument() {
      try {
        var res = await fetch(API + '?token=' + encodeURIComponent(token));
        var data = await res.json();

        if (!res.ok || data.error) {
          var msg = data.message || data.error || 'Kunne ikke laste dokumentet.';
          showError('Ugyldig lenke', msg);
          return;
        }

        var doc = data.document;
        var signer = data.signer;

        if (!signer) {
          showError('Signer ikke funnet', 'Kunne ikke finne signeringsinformasjon for denne lenken.');
          return;
        }

        // Already signed
        if (signer.signed_at) {
          showSuccess('Takk, ' + signer.name + '. Din signatur er allerede registrert.');
          return;
        }

        signerId = signer.id;

        // Show contract
        document.getElementById('docTitle').textContent = doc.title || 'Dokument';
        document.getElementById('contractBody').innerHTML = markdownToHtml(doc.content || '');
        document.getElementById('signerName').textContent = signer.name || 'Klient';
        document.title = (doc.title || 'Signer') + ' | VowFolio';

        document.getElementById('loadingCard').style.display = 'none';
        document.getElementById('contractCard').style.display = 'block';
        document.getElementById('signCard').style.display = 'block';

        // Init canvas
        initCanvas();
      } catch (e) {
        showError('Nettverksfeil', 'Kunne ikke laste dokumentet. Prøv igjen.');
      }
    }

    function showError(title, msg) {
      document.getElementById('loadingCard').style.display = 'none';
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorCard').style.display = 'block';
    }

    function showSuccess(msg) {
      document.getElementById('loadingCard').style.display = 'none';
      document.getElementById('contractCard').style.display = 'none';
      document.getElementById('signCard').style.display = 'none';
      document.getElementById('successMsg').textContent = msg;
      document.getElementById('successCard').style.display = 'block';
    }

    function markdownToHtml(md) {
      var html = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/^---$/gm, '<hr>');
      html = html.replace(/\n\n/g, '</p><p>');
      html = '<p>' + html + '</p>';
      return html;
    }

    // Contract collapse/expand
    var contractExpanded = false;
    function toggleContract() {
      var body = document.getElementById('contractBody');
      var btn = document.getElementById('toggleBtn');
      contractExpanded = !contractExpanded;
      if (contractExpanded) {
        body.classList.remove('contract-collapsed');
        body.classList.add('contract-expanded');
        btn.textContent = 'Skjul kontrakten';
      } else {
        body.classList.remove('contract-expanded');
        body.classList.add('contract-collapsed');
        btn.textContent = 'Vis hele kontrakten';
      }
    }

    // Tabs
    function switchTab(i) {
      currentTab = i;
      document.getElementById('tab0').className = i === 0 ? 'tab active' : 'tab';
      document.getElementById('tab1').className = i === 1 ? 'tab active' : 'tab';
      document.getElementById('tc0').className = i === 0 ? 'tab-content active' : 'tab-content';
      document.getElementById('tc1').className = i === 1 ? 'tab-content active' : 'tab-content';
      if (i === 1) resizeCanvas();
    }

    function updatePreview() {
      document.getElementById('sigPreview').textContent = document.getElementById('typedName').value;
    }

    // Canvas
    function initCanvas() {
      canvas = document.getElementById('sigCanvas');
      ctx = canvas.getContext('2d');
      resizeCanvas();

      canvas.addEventListener('pointerdown', function(e) {
        drawing = true;
        hasDrawn = true;
        var p = getPos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        e.preventDefault();
      });
      canvas.addEventListener('pointermove', function(e) {
        if (!drawing) return;
        var p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        e.preventDefault();
      });
      canvas.addEventListener('pointerup', function() { drawing = false; });
      canvas.addEventListener('pointerleave', function() { drawing = false; });

      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      if (!canvas) return;
      var wrap = canvas.parentElement;
      var w = wrap.clientWidth;
      var h = 200;
      var dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.strokeStyle = '#3D3229';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      hasDrawn = false;
    }

    function getPos(e) {
      var r = canvas.getBoundingClientRect();
      var cx = e.touches ? e.touches[0].clientX : e.clientX;
      var cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: cx - r.left, y: cy - r.top };
    }

    function clearCanvas() {
      var dpr = window.devicePixelRatio || 1;
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
      hasDrawn = false;
    }

    // Submit
    async function submitSignature() {
      var btn = document.getElementById('signBtn');
      var msg = document.getElementById('statusMsg');
      var body = { token: token, signer_id: signerId };

      if (currentTab === 0) {
        var name = document.getElementById('typedName').value.trim();
        if (!name) { msg.textContent = 'Vennligst skriv navnet ditt.'; return; }
        body.type = 'typed';
        body.typed_name = name;
      } else {
        if (!hasDrawn) { msg.textContent = 'Vennligst tegn signaturen din.'; return; }
        body.type = 'drawn';
        // Export at full resolution
        body.signature_data = canvas.toDataURL('image/png');
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signerer...';
      msg.textContent = '';

      try {
        var res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var data = await res.json();

        if (data.error) {
          msg.textContent = data.error;
          btn.disabled = false;
          btn.textContent = 'Signer dokument';
          return;
        }

        showSuccess('Takk! Din signatur er registrert.');
      } catch (e) {
        msg.textContent = 'Nettverksfeil. Prøv igjen.';
        btn.disabled = false;
        btn.textContent = 'Signer dokument';
      }
    }
  </script>
</body>
</html>
