<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAF7F2;
      color: #3D3229;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(61,50,41,0.08);
      max-width: 520px;
      width: 100%;
      overflow: hidden;
    }
    .card-inner { padding: 32px 28px; }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px;
      font-weight: 700;
      color: #3D3229;
      margin-bottom: 4px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #9B7E5E;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9B7E5E;
      margin-bottom: 6px;
    }
    .req { color: #C0392B; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="date"], textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E8E0D6;
      border-radius: 10px;
      font-size: 15px;
      color: #3D3229;
      background: #FDFCFA;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #9B7E5E;
    }
    input::placeholder, textarea::placeholder { color: #C4B5A3; }
    textarea { resize: vertical; min-height: 80px; }
    input[type="date"] { cursor: pointer; }
    .radio-group, .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .radio-label, .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 400;
      color: #3D3229;
      cursor: pointer;
      padding: 8px 14px;
      border: 1.5px solid #E8E0D6;
      border-radius: 10px;
      background: #FDFCFA;
      transition: border-color 0.2s, background 0.2s;
    }
    .radio-label:has(input:checked), .checkbox-label:has(input:checked) {
      border-color: #9B7E5E;
      background: rgba(155,126,94,0.05);
    }
    .radio-label input, .checkbox-label input {
      width: auto;
      accent-color: #9B7E5E;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #B8977E;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #A6876E; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #C4B5A3; cursor: not-allowed; transform: none; }

    /* Success state */
    .success {
      text-align: center;
      padding: 56px 28px;
    }
    .success-check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #6B8F71;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .success-check svg {
      width: 28px;
      height: 28px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .success h2 {
      font-family: Georgia, serif;
      font-size: 22px;
      color: #3D3229;
      margin-bottom: 8px;
    }
    .success p {
      color: #9B7E5E;
      font-size: 14px;
      line-height: 1.5;
    }
    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .error-msg {
      background: #FDF2F2;
      color: #C0392B;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .powered {
      text-align: center;
      padding: 16px 12px;
      font-size: 10px;
      color: #D5CBBF;
      letter-spacing: 0.3px;
    }
    .powered a { color: #C4B5A3; text-decoration: none; }
    .hero-img {
      width: 100%;
      height: 180px;
      background-size: cover;
      background-position: center;
      border-radius: 12px 12px 0 0;
    }
    .loading {
      text-align: center;
      padding: 60px 24px;
      color: #9B7E5E;
      font-size: 14px;
    }

    /* Sending spinner */
    .sending-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="loadingCard">
    <div class="loading">Laster...</div>
  </div>

  <div class="card" id="formCard" style="display:none;">
    <div id="heroContainer"></div>
    <div class="card-inner">
      <h1 id="studioName">Ta kontakt</h1>
      <p class="subtitle" id="subtitleText">Vi gleder oss til å høre fra dere</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="contactForm" novalidate>
        <div id="formFields"></div>
        <button type="submit" class="submit-btn" id="submitBtn">Send forespørsel</button>
      </form>
    </div>
    <div class="powered">Drevet av <a href="https://vowfolio.com" target="_blank" rel="noopener">VowFolio</a></div>
  </div>

  <div class="card" id="successCard" style="display:none;">
    <div class="success">
      <div class="success-check">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2>Takk for henvendelsen!</h2>
      <p>Vi har mottatt forespørselen deres<br>og tar kontakt så snart vi kan.</p>
    </div>
    <div class="powered">Drevet av <a href="https://vowfolio.com" target="_blank" rel="noopener">VowFolio</a></div>
  </div>

  <script>
    const API = 'https://ubdqueuknaqegipnbsxc.supabase.co/functions/v1/contact-form';
    const path = window.location.pathname;
    const match = path.match(/\/contact\/([a-z0-9]+)/);
    const formId = match ? match[1] : null;

    if (!formId) {
      document.getElementById('loadingCard').innerHTML = '<div class="loading">Skjema ikke funnet.</div>';
    } else {
      loadForm();
    }

    async function loadForm() {
      try {
        const res = await fetch(API + '?id=' + formId + '&config=1');
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderForm(data.config, data.studio);
      } catch (e) {
        document.getElementById('loadingCard').innerHTML = '<div class="loading">Skjema ikke funnet.</div>';
      }
    }

    function renderForm(config, studio) {
      // Apply theme
      var theme = config.theme || 'classic';
      if (theme === 'light') {
        document.body.style.background = '#FFFFFF';
        document.querySelector('.card').style.boxShadow = '0 2px 12px rgba(0,0,0,0.06)';
      } else if (theme === 'dark') {
        document.body.style.background = '#1A1A1A';
        document.body.style.color = '#F5F5F5';
        document.querySelectorAll('.card').forEach(function(c) {
          c.style.background = '#2A2A2A';
          c.style.boxShadow = '0 2px 12px rgba(0,0,0,0.3)';
        });
        document.querySelector('h1').style.color = '#F5F5F5';
        document.querySelector('.subtitle').style.color = '#A89B8C';
        var style = document.createElement('style');
        style.textContent = [
          'input[type=text],input[type=email],input[type=tel],input[type=date],textarea{background:#333;border-color:#444;color:#F5F5F5;}',
          'input::placeholder,textarea::placeholder{color:#666;}',
          'input:focus,textarea:focus{border-color:#B8977E;}',
          'label{color:#A89B8C;}',
          '.radio-label,.checkbox-label{background:#333;border-color:#444;color:#F5F5F5;}',
          '.radio-label:has(input:checked),.checkbox-label:has(input:checked){border-color:#B8977E;background:rgba(184,151,126,0.1);}',
          '.powered{color:#444;} .powered a{color:#666;}',
          '.error-msg{background:#3A2020;color:#E57373;}',
          '.success h2{color:#F5F5F5;} .success p{color:#A89B8C;}',
        ].join('');
        document.head.appendChild(style);
      }

      // Studio name
      if (studio && studio.studio_name) {
        document.getElementById('studioName').textContent = studio.studio_name;
        document.title = studio.studio_name + ' — Kontakt';
      }

      // Hero image
      if (studio && studio.portal_hero_url) {
        document.getElementById('heroContainer').innerHTML =
          '<div class="hero-img" style="background-image:url(\'' + studio.portal_hero_url + '\')"></div>';
      }

      // Build fields
      var fields = '';

      fields += '<div class="field"><label for="name">Navn <span class="req">*</span></label>' +
        '<input type="text" id="name" name="name" required placeholder="Ditt navn" autocomplete="name"></div>';

      if (config.show_partner_name) {
        fields += '<div class="field"><label for="partner_name">Partnerens navn</label>' +
          '<input type="text" id="partner_name" name="partner_name" placeholder="Partnerens navn" autocomplete="off"></div>';
      }

      fields += '<div class="field"><label for="email">E-post <span class="req">*</span></label>' +
        '<input type="email" id="email" name="email" required placeholder="navn@epost.no" autocomplete="email"></div>';

      if (config.show_phone) {
        fields += '<div class="field"><label for="phone">Telefon</label>' +
          '<input type="tel" id="phone" name="phone" placeholder="+47 412 34 567" autocomplete="tel"></div>';
      }

      if (config.show_preferred_contact) {
        fields += '<div class="field"><label>Foretrukket kontaktmåte</label>' +
          '<div class="radio-group">' +
          '<label class="radio-label"><input type="radio" name="preferred_contact" value="email" checked><span>E-post</span></label>' +
          '<label class="radio-label"><input type="radio" name="preferred_contact" value="phone"><span>Telefon</span></label>' +
          '</div></div>';
      }

      if (config.show_wedding_date) {
        fields += '<div class="field"><label for="wedding_date">Bryllupsdato</label>' +
          '<input type="date" id="wedding_date" name="wedding_date"></div>';
      }

      if (config.show_flexible_date && config.show_wedding_date) {
        fields += '<div class="field"><label class="checkbox-label">' +
          '<input type="checkbox" name="flexible_date" value="yes"><span>Datoen er fleksibel</span></label></div>';
      }

      if (config.show_venue) {
        fields += '<div class="field"><label for="venue">Sted / Lokale</label>' +
          '<input type="text" id="venue" name="venue" placeholder="Kirke, lokale eller område" autocomplete="off"></div>';
      }

      if (config.show_photo_style) {
        fields += '<div class="field"><label>Hva er viktigst for dere?</label>' +
          '<div class="checkbox-group">' +
          '<label class="checkbox-label"><input type="checkbox" name="photo_style" value="natural"><span>Naturlige øyeblikk</span></label>' +
          '<label class="checkbox-label"><input type="checkbox" name="photo_style" value="portraits"><span>Portretter</span></label>' +
          '<label class="checkbox-label"><input type="checkbox" name="photo_style" value="full_day"><span>Hele dagen dokumentert</span></label>' +
          '</div></div>';
      }

      if (config.show_message) {
        fields += '<div class="field"><label for="message">Fortell litt om planene deres</label>' +
          '<textarea id="message" name="message" rows="4" placeholder="Hva ser dere for dere?"></textarea></div>';
      }

      document.getElementById('formFields').innerHTML = fields;
      document.getElementById('loadingCard').style.display = 'none';
      document.getElementById('formCard').style.display = 'block';

      notifyHeight();
      new ResizeObserver(notifyHeight).observe(document.body);
      document.getElementById('contactForm').addEventListener('submit', handleSubmit);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      var errorEl = document.getElementById('errorMsg');
      var btn = document.getElementById('submitBtn');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="sending-spinner"></span>Sender...';

      var data = {};
      var fd = new FormData(e.target);
      for (var pair of fd.entries()) {
        if (pair[0] === 'photo_style') {
          if (!data[pair[0]]) data[pair[0]] = [];
          data[pair[0]].push(pair[1]);
        } else if (pair[1]) {
          data[pair[0]] = pair[1];
        }
      }

      try {
        var res = await fetch(API + '?id=' + formId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        var json = await res.json();
        if (!res.ok || json.error) throw new Error(json.error || 'Noe gikk galt');

        document.getElementById('formCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
        notifyHeight();
      } catch (err) {
        errorEl.textContent = err.message || 'Noe gikk galt. Prøv igjen.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send forespørsel';
        notifyHeight();
      }
    }

    function notifyHeight() {
      try {
        var h = document.documentElement.scrollHeight;
        window.parent.postMessage({ vowfolioHeight: h }, '*');
      } catch(e) {}
    }
  </script>
</body>
</html>
